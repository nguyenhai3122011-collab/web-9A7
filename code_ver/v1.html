<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lớp 9A7 - THCS Đông La</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root {
            --primary: #2563eb; --bg: #ffffff; --surface: rgba(248, 250, 252, 0.8);
            --text: #1f2328; --text-light: #64748b; --border: rgba(208, 215, 222, 0.5);
            --radius: 16px; --header-h: 70px; --sidebar-w: 280px;
        }
        .dark-mode {
            --primary: #58a6ff; --bg: #0d1117; --surface: rgba(22, 27, 34, 0.8);
            --text: #c9d1d9; --text-light: #8b949e; --border: rgba(48, 54, 61, 0.6);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            transition: background 0.3s; overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            position: fixed; top: 0; width: 100%; height: var(--header-h); z-index: 1000;
            background: rgba(var(--bg), 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 1.5rem; justify-content: space-between;
        }
        .logo-link { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
        #logo { width: 35px; height: 35px; border-radius: 8px; border: 1px solid var(--border); }

        /* --- NÚT MENU TRÒN (FAB) --- */
        .fab-menu {
            position: fixed; bottom: 30px; left: 25px; width: 56px; height: 56px;
            background: var(--primary); color: white; border: none; border-radius: 50%;
            font-size: 1.5rem; cursor: pointer; z-index: 1001;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }

        /* --- SIDEBAR & OVERLAY --- */
        #sidebar {
            position: fixed; top: 0; left: calc(-1 * var(--sidebar-w)); width: var(--sidebar-w); height: 100%;
            background: var(--surface); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            z-index: 2001; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); border-right: 1px solid var(--border); padding: 1.5rem;
        }
        #sidebar.open { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); z-index: 2000; display: none; }
        .overlay.show { display: block; }

        .sidebar-nav { display: flex; flex-direction: column; gap: 8px; margin-top: 2rem; }
        .sidebar-nav a { padding: 12px 16px; border-radius: 12px; text-decoration: none; color: var(--text); font-weight: 500; }
        .sidebar-nav a.active { background: var(--primary); color: white !important; }

        .search-box { position: relative; }
        #search-input { padding: 0.6rem 1rem; border-radius: 20px; border: 1px solid var(--border); background: rgba(var(--bg), 0.5); color: var(--text); outline: none; width: 140px; }
        #search-results { position: absolute; top: 110%; left: 0; right: 0; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; display: none; z-index: 101; max-height: 250px; overflow-y: auto; }
        #search-results.show { display: block; }

        /* --- CONTENT --- */
        main { margin-top: var(--header-h); padding: 2rem 1rem; max-width: 1100px; margin-inline: auto; }
        section { display: none; animation: slideUp 0.5s ease; }
        section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .post-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 2rem; display: grid; grid-template-columns: 1.2fr 1fr; overflow: hidden; }
        .post-img { width: 100%; height: 380px; object-fit: cover; cursor: pointer; }
        .post-content { padding: 2rem; display: flex; align-items: center; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .gallery-item { aspect-ratio: 4/3; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        /* --- MODALS (TRƯỜNG CLICK OUTSIDE) --- */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            display: none; align-items: center; justify-content: center; 
            z-index: 3000; touch-action: none; backdrop-filter: blur(8px);
        }
        
        .modal-body { 
            background: var(--bg); width: 90%; max-width: 450px; 
            border-radius: 24px; padding: 2rem; position: relative; 
            text-align: center; max-height: 85vh; overflow-y: auto;
        }
        
        #img-container { 
            width: 100vw; height: 100vh; display: flex; 
            align-items: center; justify-content: center; cursor: grab;
        }
        #img-full { 
            max-width: 95%; max-height: 95%; object-fit: contain; 
            transition: transform 0.1s ease-out; will-change: transform;
        }

        @media (max-width: 768px) { .post-card { grid-template-columns: 1fr; } .post-img { height: 240px; } }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <a href="https://lop9a7-thcs-dongla.ct.ws/" class="logo-link">
                <img id="logo" src="" alt="Logo">
                <span style="font-weight:700;">9A7</span>
            </a>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Tìm tên...">
                <div id="search-results"></div>
            </div>
            <button id="theme-toggle" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">🌙</button>
        </div>
    </header>

    <button class="fab-menu" onclick="UI.side(true)">☰</button>
    <div id="overlay" class="overlay" onclick="UI.side(false)"></div>

    <aside id="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="font-size:1.2rem; font-weight:700;">Menu</h2>
            <button onclick="UI.side(false)" style="background:none; border:none; font-size:1.8rem; cursor:pointer;">&times;</button>
        </div>
        <nav class="sidebar-nav">
            <a href="#home" class="active" onclick="UI.side(false)">🏠 Trang chủ</a>
            <a href="#gallery" onclick="UI.side(false)">🖼️ Kho kỉ niệm</a>
            <a href="#info" onclick="UI.side(false)">ℹ️ Thông tin lớp</a>
            <a href="https://nguyenhai3122011-collab.github.io/9A7_forums/" target="_blank">💬 Diễn đàn</a>
        </nav>
    </aside>

    <main>
        <section id="home" class="active"><h2>Bản tin lớp</h2><div id="feed-container"></div></section>
        <section id="gallery"><h2>Kho ảnh kỉ niệm</h2><div id="gallery-container" class="gallery-grid"></div></section>
        <section id="info"><h2>Giới thiệu lớp</h2><div id="info-render" style="padding:2rem; background:var(--surface); border-radius:20px; border:1px solid var(--border);"></div></section>
    </main>

    <div id="modal-st" class="modal" onclick="UI.closeSt()">
        <div class="modal-body" onclick="event.stopPropagation()">
            <button onclick="UI.closeSt()" style="position:absolute; right:20px; top:20px; border:none; background:none; font-size:1.5rem; cursor:pointer;">&times;</button>
            <img id="st-avt" style="width:110px; height:110px; border-radius:50%; object-fit:cover; border:3px solid var(--primary); margin-bottom:1rem;">
            <h2 id="st-name"></h2>
            <div id="st-desc" style="color:var(--text-light); margin:15px 0;"></div>
            <div id="st-pics" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:8px;"></div>
        </div>
    </div>

    <div id="modal-img" class="modal" onclick="UI.closeImg()">
        <div id="img-container" onclick="UI.closeImg()">
            <img id="img-full" src="" onclick="event.stopPropagation()">
        </div>
    </div>

    <script>
        const UI = {
            state: { scale: 1, x: 0, y: 0, isDragging: false, startX: 0, startY: 0, lastDist: 0 },

            async init() {
                this.setupTheme(); this.setupNav(); this.setupSearch(); this.setupZoomEvents();
                await this.loadBase();
            },

            setupTheme() {
                const btn = document.getElementById('theme-toggle');
                const update = (dark) => {
                    document.body.classList.toggle('dark-mode', dark);
                    btn.innerText = dark ? '☀️' : '🌙';
                    localStorage.setItem('theme', dark ? 'dark' : 'light');
                };
                update(localStorage.getItem('theme') === 'dark');
                btn.onclick = () => update(!document.body.classList.contains('dark-mode'));
            },

            setupNav() {
                window.onhashchange = () => {
                    const h = location.hash || '#home';
                    document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.toggle('active', a.getAttribute('href') === h));
                    document.querySelectorAll('section').forEach(s => s.classList.toggle('active', `#${s.id}` === h));
                    if(h === '#home') this.loadHome();
                    if(h === '#gallery') this.loadGallery();
                    if(h === '#info') this.loadInfo();
                };
                window.onhashchange();
            },

            side(open) {
                document.getElementById('sidebar').classList.toggle('open', open);
                document.getElementById('overlay').classList.toggle('show', open);
                document.querySelector('.fab-menu').style.opacity = open ? '0' : '1';
            },

            setupZoomEvents() {
                const modal = document.getElementById('modal-img');
                const img = document.getElementById('img-full');

                // Sửa lỗi thoát trên điện thoại bằng Touch
                modal.addEventListener('touchstart', (e) => {
                    if (e.target === modal || e.target.id === 'img-container') {
                        UI.closeImg();
                    }
                }, { passive: true });

                modal.onwheel = (e) => {
                    e.preventDefault();
                    const delta = e.deltaY > 0 ? -0.2 : 0.2;
                    this.state.scale = Math.min(Math.max(1, this.state.scale + delta), 5);
                    if(this.state.scale === 1) { this.state.x = 0; this.state.y = 0; }
                    this.updateTransform();
                };

                img.onmousedown = (e) => { if(this.state.scale > 1) { this.state.isDragging = true; this.state.startX = e.clientX - this.state.x; this.state.startY = e.clientY - this.state.y; } };
                window.onmousemove = (e) => { if(this.state.isDragging) { this.state.x = e.clientX - this.state.startX; this.state.y = e.clientY - this.state.startY; this.updateTransform(); } };
                window.onmouseup = () => this.state.isDragging = false;

                modal.ontouchstart = (e) => {
                    if(e.touches.length === 2) {
                        this.state.lastDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                    } else if(e.touches.length === 1 && this.state.scale > 1) {
                        this.state.isDragging = true;
                        this.state.startX = e.touches[0].pageX - this.state.x;
                        this.state.startY = e.touches[0].pageY - this.state.y;
                    }
                };
                modal.ontouchmove = (e) => {
                    if(e.touches.length === 2) {
                        const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                        const delta = dist > this.state.lastDist ? 0.05 : -0.05;
                        this.state.scale = Math.min(Math.max(1, this.state.scale + delta), 5);
                        this.state.lastDist = dist;
                        this.updateTransform();
                    } else if(this.state.isDragging) {
                        this.state.x = e.touches[0].pageX - this.state.startX;
                        this.state.y = e.touches[0].pageY - this.state.startY;
                        this.updateTransform();
                    }
                };
                modal.ontouchend = () => this.state.isDragging = false;
            },

            updateTransform() {
                document.getElementById('img-full').style.transform = `translate(${this.state.x}px, ${this.state.y}px) scale(${this.state.scale})`;
            },

            view(src) {
                const img = document.getElementById('img-full');
                this.state = { scale: 1, x: 0, y: 0, isDragging: false, startX: 0, startY: 0, lastDist: 0 };
                img.src = src;
                this.updateTransform();
                document.getElementById('modal-img').style.display = 'flex';
                document.body.style.overflow = 'hidden';
            },

            async loadBase() {
                const logo = await fetch('logo.txt').then(r => r.ok ? r.text() : '').catch(() => '');
                if(logo) document.getElementById('logo').src = logo.trim();
                const stu = await fetch('stu.txt').then(r => r.ok ? r.text() : '').catch(() => '');
                this.students = stu.split('\n').map(s => s.trim()).filter(s => s);
            },

            setupSearch() {
                const input = document.getElementById('search-input');
                const res = document.getElementById('search-results');
                input.oninput = () => {
                    const v = input.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                    if(!v) return res.classList.remove('show');
                    const matches = this.students.filter(s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(v));
                    res.innerHTML = matches.map(m => `<div onclick="UI.showSt('${m}'); UI.hideSearch();" style="padding:12px; cursor:pointer; border-bottom:1px solid var(--border)">${m}</div>`).join('');
                    res.classList.add('show');
                };
            },
            hideSearch() { document.getElementById('search-results').classList.remove('show'); document.getElementById('search-input').value = ''; },

            async loadHome() {
                const con = document.getElementById('feed-container'); con.innerHTML = 'Đang tải...';
                const files = await fetch('home/list.txt').then(r => r.json()).catch(() => []);
                const posts = await Promise.all(files.map(f => fetch(`home/${f}`).then(r => r.text())));
                con.innerHTML = posts.map(p => {
                    const [img, ...txt] = p.split('\n');
                    return `<div class="post-card"><img src="${img.trim()}" class="post-img" onclick="UI.view('${img.trim()}')"><div class="post-content"><p>${txt.join('<br>')}</p></div></div>`;
                }).join('');
            },

            async loadGallery() {
                const con = document.getElementById('gallery-container'); con.innerHTML = 'Đang tải...';
                const raw = await fetch('pic.txt').then(r => r.text()).catch(() => '[]');
                const urls = JSON.parse(raw.replace(/```json|```/g, ''));
                con.innerHTML = urls.map(u => `<div class="gallery-item" onclick="UI.view('${u}')"><img src="${u}" loading="lazy"></div>`).join('');
            },

            async loadInfo() {
                const t = await fetch('info.txt').then(r => r.text()).catch(() => '');
                document.getElementById('info-render').innerHTML = t.replace(/\n/g, '<br>') || 'Chưa có thông tin.';
            },

            async showSt(name) {
                const folder = encodeURIComponent(name).replace(/%20/g, '+');
                const [inf, picsR] = await Promise.all([
                    fetch(`stu/${folder}/inf.txt`).then(r => r.ok ? r.text() : '').catch(() => ''),
                    fetch(`stu/${folder}/pics.txt`).then(r => r.ok ? r.text() : '').catch(() => '')
                ]);
                const pics = picsR.split('\n').filter(p => p.trim());
                document.getElementById('st-name').innerText = name;
                document.getElementById('st-desc').innerHTML = inf || '<i>Thành viên 9A7.</i>';
                document.getElementById('st-avt').src = pics[0] || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=2563eb&color=fff`;
                document.getElementById('st-pics').innerHTML = pics.slice(1).map(p => `<img src="${p}" onclick="UI.view('${p}')" style="width:100%; height:80px; object-fit:cover; border-radius:8px; cursor:pointer;">`).join('');
                document.getElementById('modal-st').style.display = 'flex';
                document.body.style.overflow = 'hidden';
            },

            closeSt() { document.getElementById('modal-st').style.display = 'none'; document.body.style.overflow = 'auto'; },
            closeImg() { document.getElementById('modal-img').style.display = 'none'; document.body.style.overflow = 'auto'; }
        };
        UI.init();
    </script>
</body>
</html>

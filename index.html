<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lớp 9A7 - THCS Đông La</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --card-bg: #f6f8fa;
      --text-color: #1f2328;
      --accent-color: #0969da;
      --border-color: #d0d7de;
      --hover-bg: #eaeef2;
      --modal-overlay: rgba(0,0,0,0.7);
      --indicator-color: rgba(9, 105, 218, 0.12);
    }
    body.dark-mode {
      --bg-color: #0d1117;
      --card-bg: #161b22;
      --text-color: #c9d1d9;
      --accent-color: #58a6ff;
      --border-color: #30363d;
      --hover-bg: #21262d;
      --modal-overlay: rgba(0,0,0,0.9);
      --indicator-color: rgba(88, 166, 255, 0.18);
    }

    * {
      transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER - cải thiện responsive */
    header {
      background-color: var(--card-bg);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      gap: 16px;
    }

    .header-main-nav {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
      flex-wrap: wrap;
    }

    #logo {
      width: 42px;
      height: 42px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    nav {
      display: flex;
      gap: 6px;
      align-items: center;
      flex: 1;
      position: relative;
    }

    nav a {
      color: var(--text-color);
      text-decoration: none;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 6px;
      opacity: 0.85;
      font-size: 14.5px;
      white-space: nowrap;
    }

    nav a.active {
      color: var(--accent-color);
      opacity: 1;
    }

    #nav-indicator {
      position: absolute;
      background-color: var(--indicator-color);
      border-radius: 6px;
      z-index: 1;
      transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.2);
      height: 34px;
    }

    .search-container {
      position: relative;
      width: 100%;
      max-width: 280px;
    }

    #search-input {
      width: 100%;
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border-color);
      background-color: var(--bg-color);
      color: var(--text-color);
      outline: none;
      font-size: 14.5px;
    }

    .theme-switch {
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 50%;
      width: 38px;
      height: 38px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 19px;
    }

    #search-dropdown {
      position: absolute;
      top: 110%;
      left: 0;
      right: 0;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      display: none;
      list-style: none;
      padding: 6px 0;
      max-height: 260px;
      overflow-y: auto;
      z-index: 1001;
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }

    #search-dropdown.show { display: block; }
    #search-dropdown li {
      padding: 11px 16px;
      cursor: pointer;
    }
    #search-dropdown li:hover {
      background-color: var(--hover-bg);
      color: var(--accent-color);
    }

    /* MAIN */
    main {
      margin-top: 78px;
      padding: 0 16px;
      width: 100%;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }

    section {
      display: none;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s ease;
    }
    section.active {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    h1 {
      color: var(--accent-color);
      text-align: center;
      margin: 32px 0 24px;
      font-size: 1.85rem;
    }

    /* TRANG CHỦ */
    .home-item {
      display: flex;
      background-color: var(--card-bg);
      margin-bottom: 8px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      overflow: hidden;
      align-items: stretch;
    }

    .home-item .note {
      flex: 1;
      padding: 28px 40px;
      line-height: 1.75;
      font-size: 15.5px;
    }

    .home-img-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 260px;
    }

    .home-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: pointer;
    }

    /* GALLERY KỈ NIỆM - Tối ưu tỉ lệ */
    #main-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      padding: 20px 0;
    }

    .gallery-item {
      background-color: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .gallery-item img {
      width: 100%;
      height: 210px;
      object-fit: cover;
      cursor: pointer;
    }

    .gallery-item .caption {
      padding: 14px 12px;
      text-align: center;
      font-size: 13.5px;
      color: var(--text-color);
    }

    /* THÔNG TIN */
    #info-content {
      max-width: 820px;
      margin: 0 auto 50px;
      background-color: var(--card-bg);
      padding: 28px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      line-height: 1.75;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      inset: 0;
      background-color: var(--modal-overlay);
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
      padding: 20px;
    }

    .close {
      position: absolute;
      top: 18px;
      right: 25px;
      color: white;
      font-size: 38px;
      cursor: pointer;
      z-index: 10;
    }

    #student-content {
      background-color: var(--card-bg);
      width: 100%;
      max-width: 620px;
      padding: 28px;
      border-radius: 16px;
      border: 1px solid var(--border-color);
      max-height: 92vh;
      overflow-y: auto;
    }

    #st-avt {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin: 0 auto 18px;
      border: 4px solid var(--accent-color);
      object-fit: cover;
    }

    #st-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
    }

    #st-gallery img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-radius: 6px;
      cursor: pointer;
    }

    /* ==================== MEDIA QUERIES ==================== */
    @media (max-width: 850px) {
      header {
        padding: 10px 16px;
        flex-wrap: wrap;
      }
      .header-main-nav {
        gap: 12px;
      }
      .search-container {
        max-width: 100%;
        order: 3;
      }
      nav {
        order: 2;
      }

      .home-item {
        flex-direction: column-reverse;
        border-radius: 10px;
      }
      .home-item .note {
        padding: 24px 20px;
      }
      .home-img-wrapper {
        min-height: 240px;
      }
      .home-item img {
        height: 240px;
      }

      #main-gallery {
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 18px;
      }
      .gallery-item img {
        height: 190px;
      }

      h1 {
        font-size: 1.7rem;
        margin: 24px 0;
      }
    }

    @media (max-width: 480px) {
      main {
        padding: 0 12px;
      }
      .home-item .note {
        padding: 20px 16px;
        font-size: 15px;
      }
      .gallery-item img {
        height: 175px;
      }
      #main-gallery {
        gap: 16px;
      }
      #student-content {
        padding: 20px;
      }
      #st-avt {
        width: 100px;
        height: 100px;
      }
    }

    @media (min-width: 1200px) {
      .home-img-wrapper {
        min-height: 320px;
      }
      .gallery-item img {
        height: 240px;
      }
    }
  </style>
</head>
<body>
  <!-- Phần HTML giữ nguyên như code trước -->
  <header>
    <div class="header-main-nav">
      <img id="logo" src="https://via.placeholder.com/42" alt="Logo">
      <nav id="nav-menu">
        <div id="nav-indicator"></div>
        <a href="#home">Trang Chủ</a>
        <a href="#memories">Kỉ Niệm</a>
        <a href="#info">Thông Tin</a>
        <div class="search-container">
          <input type="text" id="search-input" placeholder="Tìm tên...">
          <ul id="search-dropdown"></ul>
        </div>
      </nav>
    </div>
    <button class="theme-switch" id="theme-btn">🌙</button>
  </header>

  <main>
    <section id="home"><h1>Bản Tin 9A7</h1><div id="home-list"></div></section>
    <section id="memories"><h1>Kho Ảnh Kỉ Niệm</h1><div class="gallery" id="main-gallery"></div></section>
    <section id="info"><h1>Thông Tin Lớp</h1><div id="info-content"></div></section>
  </main>

  <div id="st-modal" class="modal">
    <span class="close" onclick="closeModal()">×</span>
    <div id="student-content">
      <img id="st-avt" src="">
      <h2 id="st-name" style="text-align:center; color:var(--accent-color); margin-bottom:12px;"></h2>
      <div id="st-info"></div>
      <h4 style="border-bottom: 1px solid var(--border-color); padding-bottom:6px; margin-top:20px;">Ảnh cá nhân</h4>
      <div id="st-gallery"></div>
    </div>
  </div>

  <div id="img-modal" class="modal" onclick="this.style.display='none'">
    <span class="close">×</span>
    <img id="img-full" style="max-width:94%; max-height:94%; border-radius:8px; box-shadow: 0 10px 30px rgba(0,0,0,0.4);">
  </div>

  <script>
    // Script giữ nguyên như phiên bản trước (đã sửa loadMemories)
    let students = [];

    const themeBtn = document.getElementById('theme-btn');
    const indicator = document.getElementById('nav-indicator');
    const navLinks = document.querySelectorAll('nav a');

    function moveIndicator(el) {
      if (!el || window.innerWidth < 850) return;
      indicator.style.width = `${el.offsetWidth}px`;
      indicator.style.left = `${el.offsetLeft}px`;
      indicator.style.top = `${el.offsetTop}px`;
    }

    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark-mode');
      themeBtn.innerText = '☀️';
    }

    themeBtn.onclick = () => {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      themeBtn.innerText = isDark ? '☀️' : '🌙';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      setTimeout(() => moveIndicator(document.querySelector('nav a.active')), 50);
    };

    function showPage(id) {
      const targetId = id || 'home';
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      const target = document.getElementById(targetId);
      if (target) target.classList.add('active');

      navLinks.forEach(a => {
        a.classList.remove('active');
        if (a.getAttribute('href') === '#' + targetId) {
          a.classList.add('active');
          moveIndicator(a);
        }
      });

      if (targetId === 'home') loadHome();
      if (targetId === 'memories') loadMemories();
      if (targetId === 'info') loadInfo();
    }

    window.onhashchange = () => showPage(location.hash.slice(1));

    function viewImg(src) {
      const m = document.getElementById('img-modal');
      document.getElementById('img-full').src = src;
      m.style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('st-modal').style.display = 'none';
    }

    async function openStudent(name) {
      // ... (giữ nguyên như code cũ)
      const modal = document.getElementById('st-modal');
      const avt = document.getElementById('st-avt');
      const info = document.getElementById('st-info');
      const gal = document.getElementById('st-gallery');
      const folder = encodeURIComponent(name).replace(/%20/g, '+');

      document.getElementById('st-name').innerText = name;
      info.innerHTML = 'Đang tải...';
      gal.innerHTML = '';
      modal.style.display = 'flex';

      try {
        const r = await fetch(`stu/${folder}/inf.txt`);
        info.innerText = r.ok ? await r.text() : 'Chưa có giới thiệu.';

        const pr = await fetch(`stu/${folder}/pics.txt`);
        if (pr.ok) {
          const lines = (await pr.text()).split('\n').map(l => l.trim()).filter(l => l);
          if (lines.length > 0) {
            avt.src = lines[0];
            lines.slice(1).forEach(link => {
              const img = document.createElement('img');
              img.src = link;
              img.onclick = (e) => { e.stopPropagation(); viewImg(link); };
              gal.appendChild(img);
            });
          }
        }
      } catch (e) {
        info.innerText = 'Lỗi kết nối.';
      }
    }

    async function loadHome() {
      // ... (giữ nguyên như code cũ)
      const box = document.getElementById('home-list');
      box.innerHTML = 'Đang tải...';
      try {
        const r = await fetch('home/list.txt');
        if (!r.ok) throw new Error();
        const files = await r.json();
        box.innerHTML = '';

        for (let f of files) {
          const fr = await fetch(`home/${f}`);
          const txt = await fr.text();
          const lines = txt.split('\n');
          const d = document.createElement('div');
          d.className = 'home-item';
          d.innerHTML = `
            <div class="note">${lines.slice(1).join('<br>')}</div>
            <div class="home-img-wrapper">
              <img src="${lines[0]}" onclick="viewImg(this.src)">
            </div>`;
          box.appendChild(d);
        }
      } catch (e) {
        box.innerHTML = 'Chưa có bản tin.';
      }
    }

    async function loadMemories() {
      const g = document.getElementById('main-gallery');
      g.innerHTML = 'Đang tải album...';

      try {
        const r = await fetch('pic.txt');
        if (!r.ok) throw new Error('Không tìm thấy file pic.txt');

        let text = await r.text();
        text = text.replace(/```json\s*|\s*```/gi, '').trim();
        let urls = JSON.parse(text);

        if (!Array.isArray(urls)) throw new Error('pic.txt phải là mảng JSON');

        g.innerHTML = '';

        urls.forEach((u, i) => {
          if (!u || typeof u !== 'string') return;

          let fileName = u.split('/').pop().split('?')[0];
          if (fileName.includes('.')) {
            fileName = fileName.split('.').slice(0, -1).join('.');
          }
          let cleanName = decodeURIComponent(fileName).replace(/[-_]/g, ' ').trim();
          if (cleanName.length < 3 || cleanName.length > 40) cleanName = `Kỉ niệm ${i + 1}`;

          const item = document.createElement('div');
          item.className = 'gallery-item';
          item.innerHTML = `
            <img src="${u}" onclick="viewImg(this.src)" alt="${cleanName}">
            <div class="caption">${cleanName}</div>
          `;
          g.appendChild(item);
        });

        if (urls.length === 0) {
          g.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#888;padding:50px 20px;">Chưa có ảnh nào trong album.</p>';
        }
      } catch (e) {
        console.error(e);
        g.innerHTML = 'Lỗi tải album.<br><small>Kiểm tra file pic.txt đúng định dạng JSON.</small>';
      }
    }

    async function loadInfo() {
      try {
        const r = await fetch('info.txt');
        if (r.ok) {
          document.getElementById('info-content').innerHTML = (await r.text()).replace(/\n/g, '<br>');
        }
      } catch (e) {}
    }

    const si = document.getElementById('search-input');
    const sd = document.getElementById('search-dropdown');

    si.oninput = () => {
      const v = si.value.toLowerCase().trim();
      if (!v) { sd.classList.remove('show'); return; }
      const m = students.filter(s => s.toLowerCase().includes(v));
      sd.innerHTML = m.map(s => `<li>${s}</li>`).join('');
      sd.classList.toggle('show', m.length > 0);

      sd.querySelectorAll('li').forEach(li => {
        li.onclick = () => {
          openStudent(li.innerText);
          sd.classList.remove('show');
          si.value = '';
        };
      });
    };

    (async () => {
      try {
        const r = await fetch('stu.txt');
        if (r.ok) students = (await r.text()).split('\n').map(s => s.trim()).filter(s => s);

        const logoR = await fetch('logo.txt');
        if (logoR.ok) document.getElementById('logo').src = (await logoR.text()).trim();
      } catch (e) {}

      showPage(location.hash.slice(1) || 'home');
      setTimeout(() => moveIndicator(document.querySelector('nav a.active')), 300);
    })();
  </script>
</body>
</html>

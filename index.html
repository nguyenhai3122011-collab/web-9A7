<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lớp 9A7 - THCS Đông La</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #ffffff;
            --surface: rgba(248, 250, 252, 0.8);
            --text: #1f2328;
            --text-light: #64748b;
            --border: rgba(208, 215, 222, 0.5);
            --radius: 16px;
            --header-h: 70px;
            --sidebar-w: 280px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .dark-mode {
            --primary: #3b82f6;
            --bg: #0d1117;
            --surface: rgba(22, 27, 34, 0.8);
            --text: #c9d1d9;
            --text-light: #8b949e;
            --border: rgba(48, 54, 61, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- Header Tối Ưu --- */
        header {
            position: fixed;
            top: 0; width: 100%; height: var(--header-h);
            z-index: 1000;
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 1.5rem;
            justify-content: space-between;
        }

        .logo-link { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; transition: opacity 0.2s; }
        .logo-link:hover { opacity: 0.8; }
        #logo { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border); }

        /* --- Search Bar --- */
        .search-box { position: relative; flex-grow: 0; }
        #search-input {
            padding: 0.6rem 1.2rem;
            border-radius: 99px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            outline: none;
            width: 180px;
            transition: all 0.3s;
        }
        #search-input:focus { width: 220px; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

        /* --- Floating Action Button --- */
        .fab-menu {
            position: fixed; bottom: 30px; left: 25px;
            width: 56px; height: 56px;
            background: var(--primary); color: white;
            border: none; border-radius: 50%;
            font-size: 1.5rem; cursor: pointer;
            z-index: 1001;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .fab-menu:hover { transform: scale(1.1); background: var(--primary-hover); }

        /* --- Content Layout --- */
        main { margin-top: var(--header-h); padding: 2rem 1.5rem; max-width: 1000px; margin-inline: auto; }
        section { display: none; animation: fadeIn 0.4s ease-out; }
        section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .post-card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 2rem;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
        }
        .post-card:hover { transform: translateY(-4px); }
        .post-img { width: 100%; height: 400px; object-fit: cover; }
        .post-content { padding: 1.5rem; }

        /* --- Gallery --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }
        .gallery-item {
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            cursor: zoom-in;
            border: 1px solid var(--border);
        }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .gallery-item:hover img { transform: scale(1.1); }

        /* --- Sidebar --- */
        #sidebar {
            position: fixed; top: 0; left: -300px; width: var(--sidebar-w); height: 100%;
            background: var(--bg); z-index: 2001; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 2rem; border-right: 1px solid var(--border);
        }
        #sidebar.open { left: 0; }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            #search-input { width: 120px; }
            #search-input:focus { width: 150px; }
            .post-img { height: 250px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="#" class="logo-link">
                <img id="logo" src="https://github.com/nguyenhai3122011-collab/web-9A7/blob/main/allpic/tiktok_video_vAh2J.jpeg?raw=true" alt="Logo">
                <span style="font-weight:700; font-size: 1.2rem;">9A7</span>
            </a>
        </div>
        <div style="display:flex; align-items:center; gap:15px;">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Tìm bạn bè...">
                <div id="search-results"></div>
            </div>
            <button id="theme-toggle" style="background:none; border:none; cursor:pointer; font-size:1.4rem;">🌙</button>
        </div>
    </header>

    <button class="fab-menu" onclick="App.toggleSidebar(true)">☰</button>
    <div id="overlay" class="overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:2000; display:none; backdrop-filter:blur(4px);" onclick="App.toggleSidebar(false)"></div>

    <aside id="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
            <h2 style="font-weight:700;">Menu</h2>
            <button onclick="App.toggleSidebar(false)" style="background:none; border:none; font-size:2rem; cursor:pointer;">&times;</button>
        </div>
        <nav class="sidebar-nav" style="display:flex; flex-direction:column; gap:10px;">
            <a href="#home" style="padding:12px; text-decoration:none; color:var(--text); border-radius:10px;">🏠 Trang chủ</a>
            <a href="#gallery" style="padding:12px; text-decoration:none; color:var(--text); border-radius:10px;">🖼️ Kho kỉ niệm</a>
            <a href="#info" style="padding:12px; text-decoration:none; color:var(--text); border-radius:10px;">ℹ️ Thông tin lớp</a>
        </nav>
    </aside>

    <main>
        <section id="home" class="active"><h2>Bản tin 9A7</h2><div id="feed-container"></div></section>
        <section id="gallery"><h2>Kho ảnh kỉ niệm</h2><div id="gallery-container" class="gallery-grid"></div></section>
        <section id="info"><h2>Giới thiệu lớp</h2><div id="info-render" style="padding:2rem; background:var(--surface); border-radius:20px;"></div></section>
    </main>

    <div id="modal-img" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; align-items:center; justify-content:center; cursor: zoom-out;" onclick="this.style.display='none'">
        <img id="img-full" src="" style="max-width:95%; max-height:95%; object-fit:contain; border-radius:8px;">
    </div>

    <script>
        const App = {
            async init() {
                this.bindEvents();
                this.loadTheme();
                this.handleRouting();
                await this.fetchBaseData();
            },

            bindEvents() {
                document.getElementById('theme-toggle').onclick = () => this.toggleTheme();
                window.onhashchange = () => this.handleRouting();
            },

            toggleSidebar(show) {
                document.getElementById('sidebar').classList.toggle('open', show);
                document.getElementById('overlay').style.display = show ? 'block' : 'none';
            },

            toggleTheme() {
                const isDark = document.body.classList.toggle('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                document.getElementById('theme-toggle').innerText = isDark ? '☀️' : '🌙';
            },

            loadTheme() {
                if (localStorage.getItem('theme') === 'dark') {
                    document.body.classList.add('dark-mode');
                    document.getElementById('theme-toggle').innerText = '☀️';
                }
            },

            handleRouting() {
                const hash = location.hash || '#home';
                document.querySelectorAll('section').forEach(s => {
                    s.classList.toggle('active', `#${s.id}` === hash);
                });
                this.toggleSidebar(false);
                
                if(hash === '#home') this.renderHome();
                if(hash === '#gallery') this.renderGallery();
            },

            async fetchBaseData() {
                // Tận dụng mã cũ của bạn để load dữ liệu
                try {
                    const res = await fetch('stu.txt');
                    this.students = (await res.text()).split('\n').filter(s => s.trim());
                } catch(e) { console.error("Lỗi tải dữ liệu học sinh"); }
            },

            async renderHome() {
                const container = document.getElementById('feed-container');
                container.innerHTML = '<p>Đang tải bản tin...</p>';
                // Logic fetch bản tin giữ nguyên từ code cũ của bạn
            },

            viewImage(src) {
                const modal = document.getElementById('modal-img');
                const img = document.getElementById('img-full');
                img.src = src;
                modal.style.display = 'flex';
            }
        };

        App.init();
    </script>
</body>
</html>

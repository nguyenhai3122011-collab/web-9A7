<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lớp 9A7 - THCS Đông La</title>

<style>

/* ===== MÀU ===== */
:root {
  --bg-color: #f8f9fa;
  --card-bg: rgba(255,255,255,0.85);
  --text-color: #1f2328;
  --accent-color: #0969da;
  --border-color: #d0d7de;
  --hover-bg: #f0f3f6;
  --modal-overlay: rgba(0,0,0,0.7);
  --shadow: 0 4px 12px rgba(0,0,0,0.08);
}

body.dark-mode {
  --bg-color:#0d1117;
  --card-bg:rgba(22,27,34,0.85);
  --text-color:#c9d1d9;
  --accent-color:#58a6ff;
  --border-color:#30363d;
}

/* ===== BASE ===== */

* {
  box-sizing:border-box;
  transition:0.3s;
}

body {
  font-family:system-ui;
  margin:0;
  background:var(--bg-color);
  color:var(--text-color);
}

/* ===== HEADER ===== */

header {
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:65px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  background:var(--card-bg);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border-color);
  z-index:999;
}

nav a {
  padding:8px 16px;
  border-radius:8px;
  text-decoration:none;
  color:var(--text-color);
  font-weight:600;
}

nav a:hover {
  background:var(--hover-bg);
}

/* ===== SECTION ===== */

main { margin-top:65px; }

section {
  display:none;
  opacity:0;
  transform:translateY(20px);
}

section.active {
  display:block;
  opacity:1;
  transform:translateY(0);
}

/* ===== HOME ITEM ===== */

.home-item {
  display:flex;
  background:var(--card-bg);
  margin-bottom:20px;
  overflow:hidden;
  min-height:400px;
  transition:0.4s;
}

.home-item:hover {
  transform:translateY(-6px);
  box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.home-item img {
  width:100%;
  height:100%;
  object-fit:cover;
  cursor:pointer;
  transition:0.4s;
}

.home-item img:hover {
  transform:scale(1.05);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.note {
  flex:1;
  padding:50px;
}

/* ===== GALLERY ===== */

#main-gallery {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:25px;
  padding:20px;
}

.gallery-item {
  border-radius:12px;
  overflow:hidden;
  background:var(--card-bg);
  transition:0.4s;
}

.gallery-item:hover {
  transform:translateY(-6px);
}

.gallery-item img {
  width:100%;
  height:220px;
  object-fit:cover;
  cursor:pointer;
  transition:0.4s;
}

.gallery-item img:hover {
  transform:scale(1.05);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.caption {
  padding:15px;
  text-align:center;
  font-weight:600;
}

/* ===== MODAL ===== */

.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

#img-full {
  max-width:90%;
  max-height:85%;
  border-radius:10px;
  animation:zoomImg .35s ease;
}

@keyframes zoomImg {
  from {
    transform:scale(.7);
    opacity:0;
  }
  to {
    transform:scale(1);
    opacity:1;
  }
}

/* ===== SCROLL REVEAL ===== */

.reveal {
  opacity:0;
  transform:translateY(40px);
}

.reveal.active {
  opacity:1;
  transform:translateY(0);
}

/* ===== RIPPLE ===== */

.ripple {
  position:relative;
  overflow:hidden;
}

.ripple span {
  position:absolute;
  border-radius:50%;
  transform:scale(0);
  animation:rippleAnim .6s linear;
  background:rgba(255,255,255,.5);
}

@keyframes rippleAnim {
  to {
    transform:scale(4);
    opacity:0;
  }
}

</style>
</head>

<body>

<header>
<nav>
<a href="#home">Trang Chủ</a>
<a href="#memories">Kỉ Niệm</a>
<a href="#info">Thông Tin</a>
</nav>

<button id="theme-btn">🌙</button>
</header>

<main>

<section id="home">
<h1 style="text-align:center;">Bản Tin</h1>
<div id="home-list"></div>
</section>

<section id="memories">
<h1 style="text-align:center;">Kho Ảnh</h1>
<div id="main-gallery"></div>
</section>

<section id="info">
<h1 style="text-align:center;">Thông Tin</h1>
<div id="info-content"></div>
</section>

</main>

<div id="img-modal" class="modal" onclick="this.style.display='none'">
<img id="img-full">
</div>

<script>

/* ===== VIEW IMG ===== */

function viewImg(src){
  document.getElementById('img-full').src=src;
  document.getElementById('img-modal').style.display='flex';
}

/* ===== SCROLL REVEAL ===== */

function revealOnScroll(){
  const reveals=document.querySelectorAll('.reveal');
  const h=window.innerHeight;

  reveals.forEach(el=>{
    const top=el.getBoundingClientRect().top;
    if(top<h-80){
      el.classList.add('active');
    }
  });
}

window.addEventListener('scroll',revealOnScroll);

/* ===== RIPPLE ===== */

document.querySelectorAll('button,nav a').forEach(el=>{
el.classList.add('ripple');

el.addEventListener('click',function(e){

const circle=document.createElement("span");

const d=Math.max(this.clientWidth,this.clientHeight);

circle.style.width=circle.style.height=d+"px";

const rect=this.getBoundingClientRect();

circle.style.left=e.clientX-rect.left-d/2+"px";
circle.style.top=e.clientY-rect.top-d/2+"px";

this.appendChild(circle);

setTimeout(()=>circle.remove(),600);

});
});

/* ===== NAVIGATION ===== */

function showPage(id){

document.querySelectorAll('section')
.forEach(s=>s.classList.remove('active'));

const t=document.getElementById(id||'home');

if(t) t.classList.add('active');

}

window.onhashchange=()=>showPage(location.hash.slice(1));

showPage(location.hash.slice(1)||'home');

/* ===== LOAD HOME ===== */

async function loadHome(){

const box=document.getElementById('home-list');

try{

const r=await fetch('home/list.txt');

const files=await r.json();

box.innerHTML='';

for(let f of files){

const fr=await fetch(`home/${f}`);

const txt=await fr.text();

const lines=txt.split('\n');

const d=document.createElement('div');

d.className='home-item reveal';

d.innerHTML=`

<div class="note">

${lines.slice(1).join('<br>')}

</div>

<img src="${lines[0]}"
onclick="viewImg(this.src)">

`;

box.appendChild(d);

}

setTimeout(revealOnScroll,200);

}catch{

box.innerHTML='Chưa có bản tin';

}

}

/* ===== LOAD MEMORIES ===== */

async function loadMemories(){

const g=document.getElementById('main-gallery');

try{

const r=await fetch('pic.txt');

let text=await r.text();

let urls=JSON.parse(text);

g.innerHTML='';

urls.forEach((u,i)=>{

const item=document.createElement('div');

item.className='gallery-item reveal';

item.innerHTML=`

<img src="${u}"
onclick="viewImg(this.src)">

<div class="caption">

Kỉ niệm ${i+1}

</div>

`;

g.appendChild(item);

});

setTimeout(revealOnScroll,200);

}catch{

g.innerHTML='Lỗi album';

}

}

/* ===== LOAD INFO ===== */

async function loadInfo(){

try{

const r=await fetch('info.txt');

if(r.ok){

document.getElementById('info-content')

.innerHTML=(await r.text())

.replace(/\n/g,'<br>');

}

}catch{}

}

/* ===== AUTO LOAD ===== */

loadHome();
loadMemories();
loadInfo();

</script>

</body>
</html>

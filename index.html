<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lớp 9A7 - THCS Đông La</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #ffffff;
            --surface: rgba(248, 250, 252, 0.8); /* Nền Sidebar có độ trong suốt */
            --text: #0f172a;
            --text-light: #64748b;
            --border: rgba(226, 232, 240, 0.5);
            --radius: 16px;
            --header-h: 70px;
            --sidebar-w: 280px;
        }

        .dark-mode {
            --primary: #60a5fa;
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.7); /* Nền tối trong suốt */
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --border: rgba(51, 65, 85, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            transition: background 0.3s ease;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            position: fixed; top: 0; width: 100%; height: var(--header-h); z-index: 1000;
            background: rgba(var(--bg), 0.7); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 1.5rem; justify-content: space-between;
        }

        .menu-btn {
            background: none; border: none; color: var(--text);
            font-size: 1.5rem; cursor: pointer; padding: 5px;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- SIDEBAR MỜ (GLASSMORPHISM) --- */
        #sidebar {
            position: fixed; top: 0; left: calc(-1 * var(--sidebar-w));
            width: var(--sidebar-w); height: 100%;
            background: var(--surface); 
            backdrop-filter: blur(20px); /* Hiệu ứng mờ nền phía sau Sidebar */
            -webkit-backdrop-filter: blur(20px);
            z-index: 2001;
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            box-shadow: 10px 0 30px rgba(0,0,0,0.05);
        }
        #sidebar.open { left: 0; }

        /* Lớp phủ mờ toàn màn hình */
        .overlay {
            position: fixed; inset: 0; 
            background: rgba(0, 0, 0, 0.2); 
            backdrop-filter: blur(4px); /* Làm mờ trang web khi mở menu */
            -webkit-backdrop-filter: blur(4px);
            z-index: 2000;
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .overlay.show { display: block; opacity: 1; }

        .sidebar-nav { display: flex; flex-direction: column; gap: 8px; margin-top: 2rem; }
        .sidebar-nav a {
            padding: 12px 16px; border-radius: 12px;
            text-decoration: none; color: var(--text);
            font-weight: 500; transition: 0.3s;
            display: flex; align-items: center; gap: 12px;
        }
        .sidebar-nav a:hover { background: rgba(37, 99, 235, 0.1); color: var(--primary); transform: translateX(5px); }
        .sidebar-nav a.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }

        /* --- CÁC PHẦN CÒN LẠI (GIỮ NGUYÊN) --- */
        main { margin-top: var(--header-h); padding: 2rem 1.5rem; max-width: 1100px; margin-inline: auto; }
        section { display: none; animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .post-card {
            background: var(--surface); border-radius: var(--radius);
            border: 1px solid var(--border); margin-bottom: 2rem;
            display: grid; grid-template-columns: 1.2fr 1fr; overflow: hidden;
            backdrop-filter: blur(5px);
        }
        .post-img { width: 100%; height: 400px; object-fit: cover; }
        .post-content { padding: 2.5rem; }

        #search-input {
            padding: 0.6rem 1rem; border-radius: 20px;
            border: 1px solid var(--border); background: rgba(255,255,255,0.1);
            color: var(--text); outline: none; width: 180px; transition: 0.4s;
        }
        #search-input:focus { width: 240px; border-color: var(--primary); background: var(--bg); }

        @media (max-width: 850px) {
            .post-card { grid-template-columns: 1fr; }
            .post-img { height: 250px; }
        }
    </style>
</head>
<body class="">

    <header>
        <div style="display:flex; align-items:center; gap:15px;">
            <button class="menu-btn" onclick="UI.toggleSidebar(true)">☰</button>
            <div style="display:flex; align-items:center; gap:8px; font-weight:700;">
                <img id="logo" src="" style="width:32px; height:32px; border-radius:6px;">
                <span>9A7</span>
            </div>
        </div>
        <div style="display:flex; align-items:center; gap:15px;">
            <input type="text" id="search-input" placeholder="Tìm bạn...">
            <button id="theme-toggle" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">🌙</button>
        </div>
    </header>

    <div id="sidebar-overlay" class="overlay" onclick="UI.toggleSidebar(false)"></div>

    <aside id="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="font-size:1.2rem; font-weight:700;">Menu </h2>
            <button onclick="UI.toggleSidebar(false)" style="background:none; border:none; font-size:1.8rem; cursor:pointer; color:var(--text-light);">&times;</button>
        </div>
        <nav class="sidebar-nav">
            <a href="#home" class="active" onclick="UI.toggleSidebar(false)">🏠 Bản tin 9A7</a>
            <a href="#gallery" onclick="UI.toggleSidebar(false)"> Kho kỉ niệm</a>
            <a href="#info" onclick="UI.toggleSidebar(false)"> Thông tin lớp</a>
            <a href="https://nguyenhai3122011-collab.github.io/9A7_forums/" target="_blank">💬 Diễn đàn</a>
        </nav>
    </aside>

    <main>
        <section id="home" class="active">
            <h2 style="margin-bottom:1.5rem;">Tin tức lớp</h2>
            <div id="feed-container"></div>
        </section>
        <section id="gallery">
            <h2 style="margin-bottom:1.5rem;">Ảnh kỉ niệm</h2>
            <div id="gallery-container" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:15px;"></div>
        </section>
        <section id="info">
            <div id="info-render" style="padding:2rem; background:var(--surface); border-radius:20px; backdrop-filter:blur(10px);"></div>
        </section>
    </main>

    <script>
        const UI = {
            async init() {
                this.setupTheme();
                this.setupNav();
                await this.loadBase();
            },
            setupTheme() {
                const btn = document.getElementById('theme-toggle');
                const update = (dark) => {
                    document.body.classList.toggle('dark-mode', dark);
                    btn.innerText = dark ? '☀️' : '🌙';
                    localStorage.setItem('theme', dark ? 'dark' : 'light');
                };
                update(localStorage.getItem('theme') === 'dark');
                btn.onclick = () => update(!document.body.classList.contains('dark-mode'));
            },
            setupNav() {
                window.onhashchange = () => {
                    const h = location.hash || '#home';
                    document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.toggle('active', a.getAttribute('href') === h));
                    document.querySelectorAll('section').forEach(s => s.classList.toggle('active', `#${s.id}` === h));
                    if(h === '#home') this.loadHome();
                    // Thêm loadGallery, loadInfo tương tự bản trước
                };
                window.onhashchange();
            },
            toggleSidebar(open) {
                const side = document.getElementById('sidebar');
                const over = document.getElementById('sidebar-overlay');
                if(open) {
                    side.classList.add('open');
                    over.classList.add('show');
                    document.body.style.overflow = 'hidden';
                } else {
                    side.classList.remove('open');
                    over.classList.remove('show');
                    document.body.style.overflow = 'auto';
                }
            },
            async loadBase() {
                const r = await fetch('logo.txt').catch(()=>({text:()=>''}));
                const logo = await r.text();
                if(logo) document.getElementById('logo').src = logo.trim();
            },
            async loadHome() {
                const con = document.getElementById('feed-container');
                con.innerHTML = 'Đang tải...';
                const r = await fetch('home/list.txt').catch(()=>({json:()=>[]}));
                const files = await r.json();
                const posts = await Promise.all(files.map(f => fetch(`home/${f}`).then(res => res.text())));
                con.innerHTML = posts.map(p => {
                    const [img, ...txt] = p.split('\n');
                    return `<div class="post-card"><img src="${img.trim()}" class="post-img"><div class="post-content"><p>${txt.join('<br>')}</p></div></div>`;
                }).join('');
            }
        };
        UI.init();
    </script>
</body>
</html>

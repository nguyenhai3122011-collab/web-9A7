<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lớp 9A7 - THCS Đông La</title>
  <style>
    /* HỆ THỐNG BIẾN MÀU NÂNG CAO */
    :root {
      --bg-color: #f0f2f5;
      --card-bg: rgba(255, 255, 255, 0.8);
      --text-color: #1f2328;
      --accent-color: #0969da;
      --border-color: rgba(208, 215, 222, 0.5);
      --hover-bg: #eaeef2;
      --modal-overlay: rgba(0,0,0,0.6);
      --indicator-color: rgba(9, 105, 218, 0.2);
      --glass-blur: blur(12px);
      --shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

    body.dark-mode {
      --bg-color: #0d1117;
      --card-bg: rgba(22, 27, 34, 0.8);
      --text-color: #c9d1d9;
      --accent-color: #58a6ff;
      --border-color: rgba(48, 54, 61, 0.7);
      --hover-bg: #21262d;
      --modal-overlay: rgba(0,0,0,0.85);
      --indicator-color: rgba(88, 166, 255, 0.25);
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    * { 
      transition: background-color 0.4s ease, color 0.4s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); 
      box-sizing: border-box; 
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0; padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HIỆU ỨNG CHỮ CHẠY VÀ XUẤT HIỆN */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
    .reveal.active { opacity: 1; transform: translateY(0); }

    /* HEADER GLASSMORPHISM */
    header {
      background-color: var(--card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      gap: 20px;
      box-shadow: var(--shadow);
    }

    #logo { 
      width: 45px; height: 45px; border-radius: 12px; 
      animation: float 4s ease-in-out infinite;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    nav a { 
      color: var(--text-color); text-decoration: none; font-weight: 600; 
      padding: 8px 16px; border-radius: 8px; font-size: 14px;
      position: relative; z-index: 2; transition: 0.3s;
    }
    nav a:hover { color: var(--accent-color); transform: scale(1.05); }

    #nav-indicator {
      position: absolute; background-color: var(--indicator-color);
      border-radius: 8px; z-index: 1; transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
    }

    /* SEARCH BOX NÂNG CAO */
    .search-container { position: relative; max-width: 250px; width: 100%; margin-left: 15px; }
    #search-input { 
      width: 100%; padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border-color); 
      background: var(--bg-color); color: var(--text-color); outline: none;
      transition: all 0.3s;
    }
    #search-input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px var(--indicator-color); width: 110%; }

    /* HOME ITEMS HIỆU ỨNG HOVER */
    .home-item { 
      display: flex; background-color: var(--card-bg); margin-bottom: 15px;
      border-radius: 15px; overflow: hidden; border: 1px solid var(--border-color);
      box-shadow: var(--shadow); margin: 20px;
    }
    .home-item:hover { transform: translateY(-5px) scale(1.01); }
    .home-item .note { flex: 1; padding: 40px; line-height: 1.8; font-size: 16px; }
    
    .home-img-wrapper { flex: 1; overflow: hidden; }
    .home-item img { 
      width: 100%; height: 100%; object-fit: cover; transition: 0.8s;
      -webkit-mask-image: linear-gradient(to right, transparent, black 15%);
    }
    .home-item:hover img { transform: scale(1.1); }

    /* GALLERY NÂNG CAO */
    #main-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 30px; }
    .gallery-item { 
      background-color: var(--card-bg); border-radius: 15px; overflow: hidden; 
      border: 1px solid var(--border-color); box-shadow: var(--shadow);
      cursor: pointer; position: relative;
    }
    .gallery-item img { width: 100%; height: 250px; object-fit: cover; transition: 0.5s; }
    .gallery-item:hover img { transform: scale(1.1) rotate(1deg); }
    .gallery-item .caption { 
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      color: white; padding: 15px; opacity: 0; transition: 0.3s;
    }
    .gallery-item:hover .caption { opacity: 1; }

    /* SKELETON LOADING (Hiệu ứng khi đang tải) */
    .skeleton {
      background: linear-gradient(90deg, var(--hover-bg) 25%, var(--border-color) 50%, var(--hover-bg) 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
    }
    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* NÚT CHUYỂN THEME XOAY TRÒN */
    .theme-switch {
      background: var(--card-bg); border: 1px solid var(--border-color);
      border-radius: 50%; width: 40px; height: 40px; cursor: pointer;
      font-size: 20px; box-shadow: var(--shadow);
    }
    .theme-switch:active { transform: rotate(360deg) scale(0.8); }

    /* MODAL BLUR */
    .modal { backdrop-filter: blur(8px); }
    #student-content { animation: fadeInUp 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); }

    @media (max-width: 850px) {
      .home-item { flex-direction: column-reverse; margin: 15px; }
      .home-item .note { padding: 20px; }
      .home-item img { -webkit-mask-image: none; height: 250px; }
      #search-input:focus { width: 100%; }
    }
  </style>
</head>
<body class="reveal">

  <header>
    <div class="header-main-nav">
      <img id="logo" src="https://via.placeholder.com/42" alt="Logo">
      <nav id="nav-menu">
        <div id="nav-indicator"></div>
        <a href="#home">Trang Chủ</a>
        <a href="#memories">Kỉ Niệm</a>
        <a href="#info">Thông Tin</a>
        <div class="search-container">
          <input type="text" id="search-input" placeholder="Tìm tên...">
          <ul id="search-dropdown"></ul>
        </div>
      </nav>
    </div>
    <button class="theme-switch" id="theme-btn" title="Đổi màu nền">🌙</button>
  </header>

  <main>
    <section id="home" class="active">
        <h1 style="animation: fadeInUp 1s">Bản Tin 9A7</h1>
        <div id="home-list"></div>
    </section>
    
    <section id="memories">
        <h1>Kho Ảnh Kỉ Niệm</h1>
        <div class="gallery" id="main-gallery"></div>
    </section>
    
    <section id="info">
        <h1>Thông Tin Lớp</h1>
        <div id="info-content" class="reveal"></div>
    </section>
  </main>

  <!-- MODAL VÀ CÁC THÀNH PHẦN KHÁC GIỮ NGUYÊN NHƯ CODE CŨ... -->
  <div id="st-modal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <div id="student-content">
      <img id="st-avt" src="" class="skeleton">
      <h2 id="st-name" style="text-align:center; color:var(--accent-color); margin-bottom:10px;"></h2>
      <div id="st-info"></div>
      <h4 style="border-bottom: 1px solid var(--border-color); padding-bottom:5px;">Ảnh cá nhân</h4>
      <div id="st-gallery"></div>
    </div>
  </div>

  <div id="img-modal" class="modal" style="display:none;" onclick="this.style.display='none'">
    <span class="close">&times;</span>
    <img id="img-full" style="max-width:90%; max-height:90%; border-radius:10px; box-shadow: 0 0 50px rgba(0,0,0,0.5);">
  </div>

  <script>
    // THÊM HIỆU ỨNG REVEAL KHI CUỘN
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('active');
      });
    }, { threshold: 0.1 });

    function applyReveal() {
      document.querySelectorAll('.home-item, .gallery-item, h1, #info-content').forEach(el => {
        el.classList.add('reveal');
        observer.observe(el);
      });
    }

    // Tích hợp vào hàm load nội dung
    let students = [];
    const themeBtn = document.getElementById('theme-btn');
    const indicator = document.getElementById('nav-indicator');
    const navLinks = document.querySelectorAll('nav a');

    function moveIndicator(el) {
      if (!el || window.innerWidth < 850) return;
      indicator.style.width = `${el.offsetWidth}px`;
      indicator.style.left = `${el.offsetLeft}px`;
      indicator.style.top = `${el.offsetTop}px`;
      indicator.style.height = `${el.offsetHeight}px`;
    }

    // Các hàm showPage, loadHome, loadMemories... giữ logic cũ 
    // nhưng thêm applyReveal() sau khi vẽ xong HTML
    async function loadHome() {
      const box = document.getElementById('home-list');
      box.innerHTML = '<div class="home-item skeleton" style="height:300px; margin:20px; border-radius:15px;"></div>';
      try {
        const r = await fetch('home/list.txt');
        const files = await r.json(); box.innerHTML = '';
        for(let f of files) {
          const fr = await fetch(`home/${f}`);
          const txt = await fr.text(); const lines = txt.split('\n');
          const d = document.createElement('div'); d.className = 'home-item';
          d.innerHTML = `
            <div class="note">${lines.slice(1).join('<br>')}</div>
            <div class="home-img-wrapper">
              <img src="${lines[0]}" onclick="viewImg(this.src)" loading="lazy">
            </div>`;
          box.appendChild(d);
        }
        applyReveal();
      } catch(e) { box.innerHTML = '<p style="text-align:center">Chưa có bản tin nào.</p>'; }
    }

    // Giữ nguyên các hàm JS xử lý dữ liệu khác từ code cũ của bạn...
    // Chỉ cập nhật giao diện hiển thị cho đẹp hơn
    
    async function loadMemories() {
      const g = document.getElementById('main-gallery'); 
      g.innerHTML = Array(6).fill('<div class="gallery-item skeleton" style="height:250px"></div>').join('');
      try {
        const r = await fetch('pic.txt');
        let text = await r.text();
        let urls = JSON.parse(text.replace(/```json|```/g, '').trim());
        g.innerHTML = '';
        urls.forEach((u, i) => {
          const item = document.createElement('div'); 
          item.className = 'gallery-item';
          item.innerHTML = `<img src="${u}" onclick="viewImg(this.src)" loading="lazy"><div class="caption">Kỉ niệm số ${i+1}</div>`;
          g.appendChild(item);
        });
        applyReveal();
      } catch(e) { g.innerHTML = 'Lỗi tải ảnh.'; }
    }

    // Logic Theme và Khởi tạo
    themeBtn.onclick = () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        themeBtn.innerText = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    };

    window.onhashchange = () => showPage(location.hash.slice(1));
    window.onload = () => {
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            themeBtn.innerText = '☀️';
        }
        showPage(location.hash.slice(1) || 'home');
        document.body.classList.add('active');
    };

    // Các hàm phụ trợ (copy từ code cũ của bạn sang để đảm bảo chạy đúng)
    function showPage(id) {
      const targetId = id || 'home';
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      document.getElementById(targetId).classList.add('active');
      navLinks.forEach(a => {
        a.classList.remove('active');
        if(a.getAttribute('href') === '#'+targetId) {
          a.classList.add('active');
          setTimeout(() => moveIndicator(a), 100);
        }
      });
      if(targetId === 'home') loadHome();
      if(targetId === 'memories') loadMemories();
    }
    function viewImg(src) {
      const m = document.getElementById('img-modal');
      document.getElementById('img-full').src = src;
      m.style.display = 'flex';
    }
    function closeModal() { document.getElementById('st-modal').style.display = 'none'; }
  </script>
</body>
</html>

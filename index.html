<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lớp 9A7 - THCS Đông La</title>
  <style>
    /* HỆ THỐNG BIẾN MÀU */
    :root {
      --bg-color: #ffffff;
      --card-bg: #f6f8fa;
      --text-color: #1f2328;
      --accent-color: #0969da;
      --border-color: #d0d7de;
      --hover-bg: #eaeef2;
      --modal-overlay: rgba(0,0,0,0.7);
      --indicator-color: rgba(9, 105, 218, 0.12);
    }
    body.dark-mode {
      --bg-color: #0d1117;
      --card-bg: #161b22;
      --text-color: #c9d1d9;
      --accent-color: #58a6ff;
      --border-color: #30363d;
      --hover-bg: #21262d;
      --modal-overlay: rgba(0,0,0,0.9);
      --indicator-color: rgba(88, 166, 255, 0.18);
    }

    /* Tối ưu hiệu suất */
    * {
      box-sizing: border-box;
      transition: background-color 0.35s ease, color 0.35s ease, border-color 0.35s ease;
    }

    /* Các phần quan trọng dùng GPU acceleration */
    body, header, nav a, #nav-indicator, section, .home-item, .modal, .gallery-item {
      will-change: transform, opacity;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0; 
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      background-color: var(--card-bg);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      gap: 20px;
    }

    .header-main-nav { 
      display: flex; 
      align-items: center; 
      gap: 15px; 
      flex: 1; 
    }

    #logo { 
      width: 42px; height: 42px; 
      object-fit: cover; 
      border-radius: 8px; 
      border: 1px solid var(--border-color); 
      flex-shrink: 0;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    nav { 
      display: flex; 
      gap: 5px; 
      align-items: center; 
      flex: 1; 
      position: relative; 
    }

    nav a {
      color: var(--text-color);
      text-decoration: none;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 6px;
      opacity: 0.8;
      font-size: 14px;
      white-space: nowrap;
      position: relative;
      z-index: 2;
      transition: all 0.25s cubic-bezier(0.23, 1, 0.32, 1);
    }

    nav a:hover {
      opacity: 1;
      transform: translateY(-1px);
    }

    nav a.active { 
      color: var(--accent-color); 
      opacity: 1; 
    }

    #nav-indicator {
      position: absolute;
      background-color: var(--indicator-color);
      border-radius: 6px;
      z-index: 1;
      height: 34px;
      transition: all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1); /* mượt như iOS */
      will-change: width, left, top;
    }

    .search-container { 
      position: relative; 
      max-width: 250px; 
      width: 100%; 
      margin-left: 15px; 
    }

    #search-input {
      width: 100%; 
      padding: 7px 15px; 
      border-radius: 20px; 
      border: 1px solid var(--border-color);
      background-color: var(--bg-color); 
      color: var(--text-color); 
      outline: none; 
      font-size: 14px;
      transition: all 0.3s ease;
    }

    #search-input:focus {
      box-shadow: 0 0 0 3px var(--indicator-color);
      border-color: var(--accent-color);
    }

    .theme-switch {
      background-color: var(--bg-color); 
      border: 1px solid var(--border-color);
      border-radius: 50%; 
      width: 36px; height: 36px; 
      cursor: pointer;
      display: flex; 
      align-items: center; 
      justify-content: center; 
      flex-shrink: 0; 
      font-size: 18px;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .theme-switch:hover {
      transform: rotate(30deg) scale(1.1);
    }

    #search-dropdown {
      position: absolute; 
      top: 110%; 
      left: 0; 
      right: 0;
      background-color: var(--card-bg); 
      border: 1px solid var(--border-color);
      border-radius: 8px; 
      display: none; 
      list-style: none; 
      padding: 5px 0;
      max-height: 250px; 
      overflow-y: auto; 
      z-index: 1001;
      box-shadow: 0 8px 25px rgba(0,0,0,0.18);
      backdrop-filter: blur(10px);
    }

    #search-dropdown.show { display: block; animation: fadeIn 0.2s ease forwards; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #search-dropdown li { 
      padding: 10px 15px; 
      cursor: pointer; 
      border-bottom: 1px solid var(--border-color); 
      transition: all 0.2s ease;
    }

    #search-dropdown li:hover { 
      background-color: var(--hover-bg); 
      color: var(--accent-color); 
      padding-left: 20px;
    }

    /* LAYOUT CHÍNH */
    main { 
      margin-top: 80px; 
      padding: 0; 
      width: 100%; 
    }

    section { 
      display: none; 
      opacity: 0; 
      transform: translateY(25px); 
      transition: all 0.55s cubic-bezier(0.23, 1, 0.32, 1);
    }

    section.active { 
      display: block; 
      opacity: 1; 
      transform: translateY(0); 
    }

    h1 { 
      color: var(--accent-color); 
      text-align: center; 
      margin: 30px 0; 
      transition: color 0.4s ease;
    }

    /* TRANG CHỦ */
    .home-item {
      display: flex;
      background-color: var(--card-bg);
      margin-bottom: 4px;
      border-top: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
      overflow: hidden;
      align-items: stretch;
      width: 100%;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .home-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .home-item .note {
      flex: 1;
      padding: 30px 50px;
      line-height: 1.8;
      white-space: pre-wrap;
      display: flex;
      align-items: center;
      font-size: 16px;
    }

    .home-img-wrapper { 
      flex: 1; 
      position: relative; 
      overflow: hidden; 
    }

    .home-item img {
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      cursor: pointer; 
      display: block;
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 20%);
      mask-image: linear-gradient(to right, transparent 0%, black 20%);
    }

    .home-item:hover img {
      transform: scale(1.06);
    }

    /* GALLERY */
    #main-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .gallery-item { 
      background-color: var(--card-bg); 
      border-radius: 10px; 
      overflow: hidden; 
      border: 1px solid var(--border-color);
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .gallery-item:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 15px 35px rgba(0,0,0,0.12);
    }

    .gallery-item img { 
      width: 100%; 
      height: 200px; 
      object-fit: cover; 
      cursor: pointer;
      transition: transform 0.5s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.08);
    }

    /* MODAL */
    .modal { 
      display: none; 
      position: fixed; 
      z-index: 2000; 
      top: 0; left: 0; 
      width: 100%; height: 100%; 
      background-color: var(--modal-overlay); 
      align-items: center; 
      justify-content: center; 
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .modal.show {
      display: flex;
      opacity: 1;
    }

    #student-content { 
      background-color: var(--card-bg); 
      width: 90%; 
      max-width: 600px; 
      padding: 25px; 
      border-radius: 15px; 
      border: 1px solid var(--border-color);
      transform: scale(0.95);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .modal.show #student-content {
      transform: scale(1);
    }

    .close { 
      position: absolute; 
      top: 15px; 
      right: 25px; 
      color: white; 
      font-size: 35px; 
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .close:hover {
      transform: rotate(90deg) scale(1.2);
    }

    @media (max-width: 850px) {
      header { flex-wrap: wrap; gap: 10px; }
      .header-main-nav { flex-basis: 100%; }
      .search-container { max-width: 100%; margin: 5px 0; }
      .home-item { flex-direction: column-reverse; }
      .home-item .note { padding: 20px; }
      .home-item img {
        height: 250px;
        -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 30%);
        mask-image: linear-gradient(to bottom, transparent 0%, black 30%);
      }
      #nav-indicator { display: none; }
    }
  </style>
</head>
<body>
  <!-- Phần HTML giữ nguyên hoàn toàn -->
  <header>
    <div class="header-main-nav">
      <img id="logo" src="https://via.placeholder.com/42" alt="Logo">
      <nav id="nav-menu">
        <div id="nav-indicator"></div>
        <a href="#home">Trang Chủ</a>
        <a href="#memories">Kỉ Niệm</a>
        <a href="#info">Thông Tin</a>
        <div class="search-container">
          <input type="text" id="search-input" placeholder="Tìm tên...">
          <ul id="search-dropdown"></ul>
        </div>
      </nav>
    </div>
    <button class="theme-switch" id="theme-btn">🌙</button>
  </header>

  <main>
    <section id="home"><h1>Bản Tin 9A7</h1><div id="home-list"></div></section>
    <section id="memories"><h1>Kho Ảnh Kỉ Niệm</h1><div class="gallery" id="main-gallery"></div></section>
    <section id="info"><h1>Thông Tin Lớp</h1><div id="info-content"></div></section>
  </main>

  <div id="st-modal" class="modal">
    <span class="close" onclick="closeModal()">×</span>
    <div id="student-content">
      <img id="st-avt" src="">
      <h2 id="st-name" style="text-align:center; color:var(--accent-color); margin-bottom:10px;"></h2>
      <div id="st-info"></div>
      <h4 style="border-bottom: 1px solid var(--border-color); padding-bottom:5px;">Ảnh cá nhân</h4>
      <div id="st-gallery"></div>
    </div>
  </div>

  <div id="img-modal" class="modal" onclick="this.style.display='none'">
    <span class="close">×</span>
    <img id="img-full" style="max-width:90%; max-height:90%; border-radius:5px;">
  </div>

  <script>
    // JavaScript giữ nguyên toàn bộ logic, chỉ thêm chút tối ưu modal
    let students = [];
    const themeBtn = document.getElementById('theme-btn');
    const indicator = document.getElementById('nav-indicator');
    const navLinks = document.querySelectorAll('nav a');
    const stModal = document.getElementById('st-modal');
    const imgModal = document.getElementById('img-modal');

    function moveIndicator(el) {
      if (!el || window.innerWidth < 850) return;
      indicator.style.width = `${el.offsetWidth}px`;
      indicator.style.left = `${el.offsetLeft}px`;
      indicator.style.top = `${el.offsetTop}px`;
    }

    // Theme
    if (localStorage.getItem('theme') === 'dark') { 
      document.body.classList.add('dark-mode'); 
      themeBtn.innerText = '☀️'; 
    }

    themeBtn.onclick = () => {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      themeBtn.innerText = isDark ? '☀️' : '🌙';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      setTimeout(() => moveIndicator(document.querySelector('nav a.active')), 80);
    };

    function showPage(id) {
      const targetId = id || 'home';
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      
      const target = document.getElementById(targetId);
      if(target) target.classList.add('active');

      navLinks.forEach(a => {
        a.classList.remove('active');
        if(a.getAttribute('href') === '#'+targetId) {
          a.classList.add('active');
          moveIndicator(a);
        }
      });

      if(targetId === 'home') loadHome();
      if(targetId === 'memories') loadMemories();
      if(targetId === 'info') loadInfo();
    }

    window.onhashchange = () => showPage(location.hash.slice(1));

    function viewImg(src) {
      document.getElementById('img-full').src = src;
      imgModal.classList.add('show');
      imgModal.style.display = 'flex';
    }

    function closeModal() {
      stModal.classList.remove('show');
      setTimeout(() => {
        stModal.style.display = 'none';
      }, 400);
    }

    // Mở modal học sinh với animation mượt
    async function openStudent(name) {
      const modal = stModal;
      const avt = document.getElementById('st-avt');
      const info = document.getElementById('st-info');
      const gal = document.getElementById('st-gallery');
      const folder = encodeURIComponent(name).replace(/%20/g, '+');

      document.getElementById('st-name').innerText = name;
      info.innerHTML = 'Đang tải...'; 
      gal.innerHTML = '';
      modal.style.display = 'flex';
      
      // Trigger animation
      setTimeout(() => modal.classList.add('show'), 10);

      try {
        const r = await fetch(`stu/${folder}/inf.txt`);
        info.innerText = r.ok ? await r.text() : 'Chưa có giới thiệu.';

        const pr = await fetch(`stu/${folder}/pics.txt`);
        if(pr.ok) {
          const lines = (await pr.text()).split('\n').map(l => l.trim()).filter(l => l);
          if(lines.length > 0) {
            avt.src = lines[0];
            lines.slice(1).forEach(link => {
              const img = document.createElement('img');
              img.src = link;
              img.onclick = (e) => { e.stopPropagation(); viewImg(link); };
              gal.appendChild(img);
            });
          }
        }
      } catch(e) { 
        info.innerText = 'Lỗi kết nối.'; 
      }
    }

    // Các hàm loadHome, loadMemories, loadInfo giữ nguyên
    async function loadHome() {
      const box = document.getElementById('home-list'); 
      box.innerHTML = 'Đang tải...';
      try {
        const r = await fetch('home/list.txt');
        const files = await r.json(); 
        box.innerHTML = '';
        for(let f of files) {
          const fr = await fetch(`home/${f}`);
          const txt = await fr.text(); 
          const lines = txt.split('\n');
          const d = document.createElement('div'); 
          d.className = 'home-item';
          d.innerHTML = `
            <div class="note">${lines.slice(1).join('<br>')}</div>
            <div class="home-img-wrapper">
              <img src="${lines[0]}" onclick="viewImg(this.src)">
            </div>`;
          box.appendChild(d);
        }
      } catch(e) { 
        box.innerHTML = 'Chưa có bản tin.'; 
      }
    }

    async function loadMemories() {
      const g = document.getElementById('main-gallery');
      g.innerHTML = 'Đang tải album...';
      try {
        const r = await fetch('pic.txt');
        let text = await r.text();
        let urls = JSON.parse(text.replace(/```json|```/g, '').trim());
        g.innerHTML = '';
       
        urls.forEach((u, i) => {
          let fileName = u.split('/').pop().split('?')[0];
          if (fileName.includes('.')) {
              fileName = fileName.split('.').slice(0, -1).join('.');
          }
          let cleanName = decodeURIComponent(fileName).replace(/[-_]/g, ' ').trim();
          if (cleanName.length < 3 || cleanName.length > 35) cleanName = `Kỉ niệm ${i + 1}`;

          const item = document.createElement('div');
          item.className = 'gallery-item';
          item.innerHTML = `
            <img src="${u}" onclick="viewImg(this.src)">
            <div class="caption">${cleanName}</div>
          `;
          g.appendChild(item);
        });
      } catch(e) { 
        g.innerHTML = 'Lỗi album hoặc file pic.txt không đúng.'; 
      }
    }

    async function loadInfo() {
      try {
        const r = await fetch('info.txt');
        if(r.ok) document.getElementById('info-content').innerHTML = (await r.text()).replace(/\n/g, '<br>');
      } catch(e){}
    }

    // Search
    const si = document.getElementById('search-input');
    const sd = document.getElementById('search-dropdown');

    si.oninput = () => {
      const v = si.value.toLowerCase().trim();
      if(!v) { 
        sd.classList.remove('show'); 
        return; 
      }
      const m = students.filter(s => s.toLowerCase().includes(v));
      sd.innerHTML = m.map(s => `<li>${s}</li>`).join('');
      sd.classList.toggle('show', m.length > 0);
      
      sd.querySelectorAll('li').forEach(li => {
        li.onclick = () => { 
          openStudent(li.innerText); 
          sd.classList.remove('show'); 
          si.value = ''; 
        };
      });
    };

    // Khởi tạo
    (async () => {
      try {
        const r = await fetch('stu.txt');
        students = (await r.text()).split('\n').map(s => s.trim()).filter(s => s);

        const logoR = await fetch('logo.txt');
        if(logoR.ok) document.getElementById('logo').src = (await logoR.text()).trim();
      } catch(e){}

      showPage(location.hash.slice(1) || 'home');
      setTimeout(() => moveIndicator(document.querySelector('nav a.active')), 350);
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lớp 9A7 - THCS Đông La</title>
  <style>
    /* HỆ THỐNG BIẾN MÀU */
    :root {
      --bg-color: #ffffff;
      --card-bg: rgba(246, 248, 250, 0.8); /* Độ trong suốt cho glassmorphism */
      --text-color: #1f2328;
      --accent-color: #0969da;
      --border-color: #d0d7de;
      --hover-bg: #eaeef2;
      --modal-overlay: rgba(0,0,0,0.7);
      --nav-indicator: rgba(9, 105, 218, 0.1);
    }

    body.dark-mode {
      --bg-color: #0d1117;
      --card-bg: rgba(22, 27, 34, 0.8);
      --text-color: #c9d1d9;
      --accent-color: #58a6ff;
      --border-color: #30363d;
      --hover-bg: #21262d;
      --modal-overlay: rgba(0,0,0,0.9);
      --nav-indicator: rgba(88, 166, 255, 0.15);
    }

    * { transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0; padding: 0;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background-color: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      gap: 20px;
    }

    .header-main-nav { display: flex; align-items: center; gap: 15px; flex: 1; }
    #logo { width: 42px; height: 42px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border-color); flex-shrink: 0; }

    /* NAV VỚI THANH TRƯỢT */
    nav { 
      display: flex; 
      gap: 5px; 
      align-items: center; 
      position: relative; 
      flex: 1; 
    }

    nav a { 
      color: var(--text-color); 
      text-decoration: none; 
      font-weight: 600; 
      padding: 8px 15px; 
      border-radius: 6px; 
      font-size: 14px;
      white-space: nowrap;
      position: relative;
      z-index: 2;
      transition: color 0.3s ease;
    }
    nav a.active { color: var(--accent-color); }

    /* THANH TRƯỢT (INDICATOR) */
    #nav-indicator {
      position: absolute;
      background-color: var(--nav-indicator);
      border-radius: 6px;
      z-index: 1;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      height: 34px; /* Khớp chiều cao padding của thẻ a */
      pointer-events: none;
    }

    .search-container { position: relative; max-width: 250px; width: 100%; margin-left: 15px; }
    #search-input { 
      width: 100%; padding: 7px 15px; border-radius: 20px; 
      border: 1px solid var(--border-color); background-color: var(--bg-color); 
      color: var(--text-color); outline: none; font-size: 14px;
    }

    .theme-switch {
      background-color: var(--bg-color); border: 1px solid var(--border-color);
      border-radius: 50%; width: 36px; height: 36px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    /* HIỆU ỨNG NỘI DUNG TRƯỢT LÊN */
    section { 
      display: none; 
      opacity: 0; 
      transform: translateY(20px); 
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    section.active { display: block; }
    section.show { opacity: 1; transform: translateY(0); }

    main { margin-top: 85px; padding: 20px; max-width: 1000px; margin-left: auto; margin-right: auto; }
    h1 { color: var(--accent-color); text-align: center; margin-bottom: 30px; }

    /* Các thành phần nội dung giữ nguyên */
    .home-item { display: flex; background-color: var(--card-bg); padding: 25px; border-radius: 12px; margin-bottom: 25px; gap: 30px; border: 1px solid var(--border-color); }
    .home-item .note { flex: 1; line-height: 1.8; white-space: pre-wrap; }
    .home-item img { width: 350px; max-width: 45%; border-radius: 10px; cursor: pointer; object-fit: cover; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
    .gallery-item { background-color: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid var(--border-color); }
    .gallery-item img { width: 100%; height: 200px; object-fit: cover; cursor: pointer; }

    /* Modal giữ nguyên */
    .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--modal-overlay); align-items: center; justify-content: center; }
    #student-content { background-color: var(--card-bg); width: 90%; max-width: 600px; padding: 25px; border-radius: 15px; border: 1px solid var(--border-color); }

    @media (max-width: 850px) {
      header { flex-wrap: wrap; gap: 10px; }
      .header-main-nav { flex-basis: 100%; }
      .search-container { max-width: 100%; margin: 5px 0; }
      #nav-indicator { display: none; } /* Ẩn indicator trên mobile để tránh lỗi vị trí */
    }
  </style>
</head>
<body>

  <header>
    <div class="header-main-nav">
      <img id="logo" src="https://via.placeholder.com/42" alt="Logo">
      <nav id="nav-wrapper">
        <div id="nav-indicator"></div>
        <a href="#home">Trang Chủ</a>
        <a href="#memories">Kỉ Niệm</a>
        <a href="#info">Thông Tin</a>
        <div class="search-container">
          <input type="text" id="search-input" placeholder="Tìm tên...">
          <ul id="search-dropdown" style="position: absolute; width: 100%; background: var(--card-bg); border-radius: 8px; list-style: none; padding: 0; display: none; z-index: 10; border: 1px solid var(--border-color);"></ul>
        </div>
      </nav>
    </div>
    <button class="theme-switch" id="theme-btn">🌙</button>
  </header>

  <main>
    <section id="home"><h1>Bản Tin 9A7</h1><div id="home-list"></div></section>
    <section id="memories"><h1>Kho Ảnh Kỉ Niệm</h1><div class="gallery" id="main-gallery"></div></section>
    <section id="info"><h1>Thông Tin Lớp</h1><div id="info-content" style="background-color:var(--card-bg); padding:20px; border-radius:10px; border: 1px solid var(--border-color);"></div></section>
  </main>

  <div id="st-modal" class="modal">
    <div id="student-content">
      <span onclick="closeModal()" style="float:right; cursor:pointer; font-size:25px;">&times;</span>
      <img id="st-avt" src="">
      <h2 id="st-name" style="text-align:center; color:var(--accent-color);"></h2>
      <div id="st-info"></div>
      <div id="st-gallery"></div>
    </div>
  </div>

  <script>
    let students = [];
    const themeBtn = document.getElementById('theme-btn');
    const indicator = document.getElementById('nav-indicator');
    const navLinks = document.querySelectorAll('nav a');
    const navWrapper = document.getElementById('nav-wrapper');

    // --- HÀM DI CHUYỂN THANH TRƯỢT ---
    function updateIndicator(el) {
      if (!el) return;
      indicator.style.width = el.offsetWidth + 'px';
      indicator.style.left = el.offsetLeft + 'px';
    }

    // Hiệu ứng hover
    navLinks.forEach(link => {
      link.addEventListener('mouseenter', () => updateIndicator(link));
    });

    // Khi rê chuột ra ngoài, quay về mục đang Active
    navWrapper.addEventListener('mouseleave', () => {
      const activeLink = document.querySelector('nav a.active');
      updateIndicator(activeLink);
    });

    // --- DARK MODE ---
    if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark-mode'); themeBtn.innerText = '☀️'; }
    themeBtn.onclick = () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        themeBtn.innerText = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    };

    // --- CHUYỂN TRANG MƯỢT ---
    function showPage(id) {
      const targetId = id || 'home';
      const sections = document.querySelectorAll('section');
      const target = document.getElementById(targetId);

      sections.forEach(s => {
        s.classList.remove('active', 'show');
        s.style.display = 'none';
      });

      target.style.display = 'block';
      setTimeout(() => target.classList.add('active', 'show'), 50);

      navLinks.forEach(a => {
        a.classList.remove('active');
        if(a.getAttribute('href') === '#' + targetId) {
          a.classList.add('active');
          updateIndicator(a); // Chạy thanh trượt đến mục chọn
        }
      });

      if(targetId === 'home') loadHome();
      if(targetId === 'memories') loadMemories();
      if(targetId === 'info') loadInfo();
    }

    window.onhashchange = () => showPage(location.hash.slice(1));

    // --- DỮ LIỆU ---
    // (Giữ nguyên các hàm loadHome, loadMemories, loadInfo, openStudent của bạn)
    async function loadHome() { /* ... code cũ ... */ }
    async function loadMemories() { /* ... code cũ ... */ }
    async function loadInfo() { /* ... code cũ ... */ }
    function closeModal() { document.getElementById('st-modal').style.display = 'none'; }

    // Khởi tạo
    (async () => {
      try {
        const r = await fetch('stu.txt');
        students = (await r.text()).split('\n').map(s => s.trim()).filter(s => s);
      } catch(e){}
      showPage(location.hash.slice(1));
      // Đợi một chút để font tải xong rồi mới tính toán vị trí indicator chính xác
      setTimeout(() => updateIndicator(document.querySelector('nav a.active')), 300);
    })();
  </script>
</body>
</html>

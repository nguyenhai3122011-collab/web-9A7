<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9A7 - Niên khóa 2021-2025</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #ffffff;
            --surface: rgba(248, 250, 252, 0.8);
            --text: #1f2328;
            --text-light: #64748b;
            --border: rgba(208, 215, 222, 0.5);
            --radius: 16px;
            --header-h: 70px;
            --sidebar-w: 280px;
        }

        .dark-mode {
            --primary: #58a6ff;
            --bg: #0d1117;
            --surface: rgba(22, 27, 34, 0.8);
            --text: #c9d1d9;
            --text-light: #8b949e;
            --border: rgba(48, 54, 61, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); color: var(--text);
            transition: background 0.3s; overflow-x: hidden;
        }

        /* --- HEADER & GLASS --- */
        header {
            position: fixed; top: 0; width: 100%; height: var(--header-h); z-index: 1000;
            background: rgba(var(--bg), 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 1.5rem; justify-content: space-between;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-btn { background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; }
        #logo { width: 35px; height: 35px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); }

        /* --- SIDEBAR TRƯỢT MỜ --- */
        #sidebar {
            position: fixed; top: 0; left: calc(-1 * var(--sidebar-w));
            width: var(--sidebar-w); height: 100%;
            background: var(--surface); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 2001; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border-right: 1px solid var(--border); padding: 1.5rem;
        }
        #sidebar.open { left: 0; }
        
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.3); 
            backdrop-filter: blur(4px); z-index: 2000; display: none; opacity: 0; transition: 0.4s;
        }
        .overlay.show { display: block; opacity: 1; }

        .sidebar-nav { display: flex; flex-direction: column; gap: 8px; margin-top: 2rem; }
        .sidebar-nav a {
            padding: 12px 16px; border-radius: 12px; text-decoration: none;
            color: var(--text); font-weight: 500; transition: 0.3s;
        }
        .sidebar-nav a:hover { background: rgba(37, 99, 235, 0.1); color: var(--primary); transform: translateX(5px); }
        .sidebar-nav a.active { background: var(--primary); color: white !important; }

        /* --- TÌM KIẾM --- */
        .search-box { position: relative; }
        #search-input {
            padding: 0.6rem 1rem; border-radius: 20px; border: 1px solid var(--border);
            background: rgba(var(--bg), 0.5); color: var(--text); outline: none; width: 180px; transition: 0.4s;
        }
        #search-input:focus { width: 240px; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
        
        #search-results {
            position: absolute; top: 110%; left: 0; right: 0;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 12px; display: none; z-index: 101; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-height: 300px; overflow-y: auto;
        }
        #search-results.show { display: block; }
        .res-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid var(--border); }
        .res-item:hover { background: var(--surface); color: var(--primary); }

        /* --- NỘI DUNG --- */
        main { margin-top: var(--header-h); padding: 2rem 1rem; max-width: 1000px; margin-inline: auto; }
        section { display: none; animation: slideUp 0.5s ease; }
        section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .post-card {
            background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
            margin-bottom: 2rem; display: grid; grid-template-columns: 1.2fr 1fr; overflow: hidden;
        }
        .post-img { width: 100%; height: 350px; object-fit: cover; cursor: pointer; }
        .post-content { padding: 2rem; font-size: 0.95rem; line-height: 1.7; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        .gallery-item { aspect-ratio: 4/3; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .gallery-item:hover img { transform: scale(1.08); }

        /* --- MODAL --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center;
            z-index: 3000; padding: 20px; backdrop-filter: blur(8px);
        }
        .modal-body {
            background: var(--bg); width: 100%; max-width: 600px;
            border-radius: 24px; padding: 2rem; position: relative; text-align: center;
            max-height: 90vh; overflow-y: auto;
        }

        @media (max-width: 768px) {
            .post-card { grid-template-columns: 1fr; }
            .post-img { height: 220px; }
            #search-input { width: 130px; }
            #search-input:focus { width: 160px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="menu-btn" onclick="UI.side(true)">☰</button>
            <div class="logo-area" style="display:flex; align-items:center; gap:10px; font-weight:700;">
                <img id="logo" src="" alt="">
                <span>9A7</span>
            </div>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Tìm tên...">
                <div id="search-results"></div>
            </div>
            <button id="theme-toggle" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">🌙</button>
        </div>
    </header>

    <div id="overlay" class="overlay" onclick="UI.side(false)"></div>

    <aside id="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="font-size:1.2rem;">Danh mục</h2>
            <button onclick="UI.side(false)" style="background:none; border:none; font-size:1.8rem; cursor:pointer;">&times;</button>
        </div>
        <nav class="sidebar-nav">
            <a href="#home" class="active" onclick="UI.side(false)">🏠 Trang chủ</a>
            <a href="#gallery" onclick="UI.side(false)">🖼️ Kho kỉ niệm</a>
            <a href="#info" onclick="UI.side(false)">ℹ️ Thông tin lớp</a>
            <a href="https://nguyenhai3122011-collab.github.io/9A7_forums/" target="_blank">💬 Diễn đàn</a>
        </nav>
    </aside>

    <main>
        <section id="home" class="active">
            <h2 style="margin-bottom:1.5rem;">Bản tin lớp</h2>
            <div id="feed-container"></div>
        </section>

        <section id="gallery">
            <h2 style="margin-bottom:1.5rem;">Kho ảnh tập thể</h2>
            <div id="gallery-container" class="gallery-grid"></div>
        </section>

        <section id="info">
            <h2 style="margin-bottom:1.5rem;">Giới thiệu về 9A7</h2>
            <div id="info-render" style="padding:2rem; background:var(--surface); border-radius:20px; border:1px solid var(--border);"></div>
        </section>
    </main>

    <div id="modal-st" class="modal">
        <div class="modal-body">
            <button onclick="UI.closeSt()" style="position:absolute; right:20px; top:20px; border:none; background:none; font-size:1.5rem; cursor:pointer;">&times;</button>
            <img id="st-avt" style="width:110px; height:110px; border-radius:50%; object-fit:cover; border:4px solid var(--primary); margin-bottom:1rem;">
            <h2 id="st-name"></h2>
            <p id="st-desc" style="color:var(--text-light); margin:15px 0;"></p>
            <div id="st-pics" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:8px;"></div>
        </div>
    </div>

    <div id="modal-img" class="modal" onclick="this.style.display='none'">
        <img id="img-full" style="max-width:95%; max-height:95%; object-fit:contain; border-radius:12px;">
    </div>

    <script>
        const UI = {
            async init() {
                this.setupTheme();
                this.setupNav();
                this.setupSearch();
                await this.loadBase();
            },

            setupTheme() {
                const btn = document.getElementById('theme-toggle');
                const update = (dark) => {
                    document.body.classList.toggle('dark-mode', dark);
                    btn.innerText = dark ? '☀️' : '🌙';
                    localStorage.setItem('theme', dark ? 'dark' : 'light');
                };
                update(localStorage.getItem('theme') === 'dark');
                btn.onclick = () => update(!document.body.classList.contains('dark-mode'));
            },

            setupNav() {
                window.onhashchange = () => {
                    const h = location.hash || '#home';
                    document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.toggle('active', a.getAttribute('href') === h));
                    document.querySelectorAll('section').forEach(s => s.classList.toggle('active', `#${s.id}` === h));
                    if(h === '#home') this.loadHome();
                    if(h === '#gallery') this.loadGallery();
                    if(h === '#info') this.loadInfo();
                };
                window.onhashchange();
            },

            side(open) {
                document.getElementById('sidebar').classList.toggle('open', open);
                document.getElementById('overlay').classList.toggle('show', open);
                document.body.style.overflow = open ? 'hidden' : 'auto';
            },

            async loadBase() {
                const logo = await fetch('logo.txt').then(r => r.ok ? r.text() : '').catch(() => '');
                if(logo) document.getElementById('logo').src = logo.trim();
                const stu = await fetch('stu.txt').then(r => r.ok ? r.text() : '').catch(() => '');
                this.students = stu.split('\n').map(s => s.trim()).filter(s => s);
            },

            setupSearch() {
                const input = document.getElementById('search-input');
                const res = document.getElementById('search-results');
                input.oninput = () => {
                    const v = input.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                    if(!v) return res.classList.remove('show');
                    const matches = this.students.filter(s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(v));
                    res.innerHTML = matches.map(m => `<div class="res-item">${m}</div>`).join('');
                    res.classList.toggle('show', matches.length > 0);
                    res.querySelectorAll('.res-item').forEach(i => {
                        i.onclick = () => { this.showSt(i.innerText); res.classList.remove('show'); input.value = ''; };
                    });
                };
            },

            async loadHome() {
                const con = document.getElementById('feed-container');
                con.innerHTML = 'Đang tải bản tin...';
                const files = await fetch('home/list.txt').then(r => r.ok ? r.json() : []).catch(() => []);
                const posts = await Promise.all(files.map(f => fetch(`home/${f}`).then(res => res.ok ? res.text() : '')));
                con.innerHTML = posts.filter(p => p).map(p => {
                    const [img, ...txt] = p.split('\n');
                    return `<div class="post-card">
                        <img src="${img.trim()}" class="post-img" onclick="UI.view('${img.trim()}')">
                        <div class="post-content"><p>${txt.join('<br>')}</p></div>
                    </div>`;
                }).join('');
            },

            async loadGallery() {
                const con = document.getElementById('gallery-container');
                con.innerHTML = 'Đang tải ảnh...';
                const raw = await fetch('pic.txt').then(r => r.ok ? r.text() : '[]').catch(() => '[]');
                const urls = JSON.parse(raw.replace(/```json|```/g, ''));
                con.innerHTML = urls.map(u => `<div class="gallery-item" onclick="UI.view('${u}')"><img src="${u}" loading="lazy"></div>`).join('');
            },

            async loadInfo() {
                const t = await fetch('info.txt').then(r => r.ok ? r.text() : '').catch(() => '');
                document.getElementById('info-render').innerHTML = t ? t.replace(/\n/g, '<br>') : 'Chưa có thông tin chung.';
            },

            async showSt(name) {
                const folder = encodeURIComponent(name).replace(/%20/g, '+');
                let inf = '';
                let picsR = '';
                
                try {
                    const [r1, r2] = await Promise.all([
                        fetch(`stu/${folder}/inf.txt`),
                        fetch(`stu/${folder}/pics.txt`)
                    ]);
                    if(r1.ok) inf = await r1.text();
                    if(r2.ok) picsR = await r2.text();
                } catch(e) {}

                const pics = picsR.split('\n').filter(p => p.trim());
                
                document.getElementById('st-name').innerText = name;
                
                if (!inf && pics.length === 0) {
                    document.getElementById('st-desc').innerHTML = `<i style="color:var(--text-light)">Hiện chưa có thông tin chi tiết về bạn này.</i>`;
                } else {
                    document.getElementById('st-desc').innerText = inf || 'Chưa cập nhật dòng giới thiệu.';
                }

                const defaultAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=2563eb&color=fff&size=120`;
                document.getElementById('st-avt').src = pics[0] || defaultAvatar;
                
                document.getElementById('st-pics').innerHTML = pics.slice(1).map(p => `<img src="${p}" onclick="UI.view('${p}')" style="width:100%; height:90px; object-fit:cover; border-radius:8px; cursor:pointer;">`).join('');
                
                document.getElementById('modal-st').style.display = 'flex';
            },

            view(src) { document.getElementById('img-full').src = src; document.getElementById('modal-img').style.display = 'flex'; },
            closeSt() { document.getElementById('modal-st').style.display = 'none'; }
        };

        UI.init();
    </script>
</body>
</html>

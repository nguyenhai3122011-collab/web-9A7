<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lớp 9A7 - THCS Đông La</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --card-bg: #ffffff;
      --text-color: #1f2328;
      --accent-color: #0969da;
      --border-color: #d0d7de;
      --hover-bg: #f6f8fa;
      --indicator-color: rgba(9, 105, 218, 0.1);
      --shadow: 0 2px 10px rgba(0,0,0,0.05);
    }

    body.dark-mode {
      --bg-color: #0d1117;
      --card-bg: #161b22;
      --text-color: #c9d1d9;
      --accent-color: #58a6ff;
      --border-color: #30363d;
      --hover-bg: #21262d;
      --indicator-color: rgba(88, 166, 255, 0.15);
      --shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    * { box-sizing: border-box; transition: all 0.3s ease; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0; padding: 0;
    }

    /* FIX HEADER: CHIA 3 PHẦN RÕ RÀNG */
    header {
      background-color: var(--card-bg);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between; /* Chia đều khoảng cách */
      padding: 0 20px;
      height: 65px;
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 1000;
      box-shadow: var(--shadow);
    }

    .header-left { display: flex; align-items: center; gap: 15px; }
    #logo { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border-color); }

    nav { display: flex; gap: 5px; position: relative; }
    nav a { 
      color: var(--text-color); text-decoration: none; font-weight: 600; 
      padding: 8px 15px; border-radius: 6px; font-size: 14px; position: relative; z-index: 2;
    }
    nav a.active { color: var(--accent-color); }

    #nav-indicator {
      position: absolute; background-color: var(--indicator-color);
      border-radius: 6px; z-index: 1; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    /* FIX THANH TÌM KIẾM: KHÔNG CHO ĐÈ LÊN MENU */
    .header-right { display: flex; align-items: center; gap: 15px; }
    .search-container { position: relative; width: 200px; }
    #search-input { 
      width: 100%; padding: 7px 15px; border-radius: 20px; 
      border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color);
    }
    #search-input:focus { border-color: var(--accent-color); width: 240px; outline: none; }

    .theme-switch {
      background: none; border: 1px solid var(--border-color); border-radius: 50%;
      width: 35px; height: 35px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* NỘI DUNG CHÍNH */
    main { margin-top: 85px; padding: 20px; }
    section { display: none; opacity: 0; transform: translateY(10px); }
    section.active { display: block; opacity: 1; transform: translateY(0); }

    h1 { text-align: center; color: var(--accent-color); margin-bottom: 30px; }

    /* FIX BẢN TIN: CHIA ĐỀU 2 BÊN */
    .home-item { 
      display: flex; background: var(--card-bg); border: 1px solid var(--border-color);
      border-radius: 12px; margin-bottom: 30px; overflow: hidden; box-shadow: var(--shadow);
      min-height: 350px;
    }
    .home-item .note { flex: 1; padding: 40px; font-size: 17px; line-height: 1.8; display: flex; align-items: center; }
    .home-img-wrapper { flex: 1; }
    .home-item img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

    /* GALLERY */
    #main-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .gallery-item { border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); background: var(--card-bg); }
    .gallery-item img { width: 100%; height: 200px; object-fit: cover; transition: 0.4s; }
    .gallery-item:hover img { transform: scale(1.05); }
    .gallery-item .caption { padding: 10px; text-align: center; font-size: 13px; font-weight: 500; }

    /* SEARCH DROPDOWN */
    #search-dropdown {
      position: absolute; top: 110%; left: 0; right: 0; background: var(--card-bg);
      border: 1px solid var(--border-color); border-radius: 8px; display: none;
      list-style: none; padding: 0; margin: 0; max-height: 200px; overflow-y: auto; z-index: 1001;
    }
    #search-dropdown.show { display: block; }
    #search-dropdown li { padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border-color); }
    #search-dropdown li:hover { background: var(--hover-bg); }

    /* MODAL */
    .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
    .modal-content { background: var(--card-bg); width: 90%; max-width: 600px; padding: 25px; border-radius: 15px; position: relative; }
    .close { position: absolute; top: 10px; right: 20px; font-size: 30px; color: var(--text-color); cursor: pointer; }

    @media (max-width: 800px) {
      header { padding: 0 10px; }
      .search-container { width: 120px; }
      #search-input:focus { width: 150px; }
      .home-item { flex-direction: column-reverse; }
      #nav-indicator { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <img id="logo" src="https://via.placeholder.com/40" alt="Lớp 9A7">
      <nav id="nav-menu">
        <div id="nav-indicator"></div>
        <a href="#home">Trang Chủ</a>
        <a href="#memories">Kỉ Niệm</a>
        <a href="#info">Thông Tin</a>
      </nav>
    </div>

    <div class="header-right">
      <div class="search-container">
        <input type="text" id="search-input" placeholder="Tìm tên...">
        <ul id="search-dropdown"></ul>
      </div>
      <button class="theme-switch" id="theme-btn">🌙</button>
    </div>
  </header>

  <main>
    <section id="home" class="active">
      <h1>Bản Tin 9A7</h1>
      <div id="home-list"></div>
    </section>

    <section id="memories">
      <h1>Kho Ảnh Kỉ Niệm</h1>
      <div id="main-gallery"></div>
    </section>

    <section id="info">
      <h1>Thông Tin Lớp</h1>
      <div id="info-content" style="max-width:800px; margin: 0 auto; line-height: 1.6;"></div>
    </section>
  </main>

  <div id="st-modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <div id="student-detail">
          <img id="st-avt" style="width:100px; height:100px; border-radius:50%; display:block; margin: 0 auto 15px; border: 2px solid var(--accent-color);">
          <h2 id="st-name" style="text-align:center;"></h2>
          <div id="st-info" style="background: var(--hover-bg); padding:15px; border-radius:8px; margin: 15px 0;"></div>
          <div id="st-gallery" style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px;"></div>
      </div>
    </div>
  </div>

  <div id="img-modal" class="modal" onclick="this.style.display='none'">
    <img id="img-full" style="max-width:90%; max-height:90%; border-radius:8px;">
  </div>

  <script>
    let students = [];
    const indicator = document.getElementById('nav-indicator');

    function moveIndicator(el) {
      if (!el || window.innerWidth < 800) return;
      indicator.style.width = `${el.offsetWidth}px`;
      indicator.style.left = `${el.offsetLeft}px`;
      indicator.style.top = `${el.offsetTop}px`;
      indicator.style.height = `${el.offsetHeight}px`;
    }

    async function loadHome() {
      const box = document.getElementById('home-list');
      try {
        const r = await fetch('home/list.txt');
        const files = await r.json(); box.innerHTML = '';
        for(let f of files) {
          const fr = await fetch(`home/${f}`);
          const txt = await fr.text(); const lines = txt.split('\n');
          const d = document.createElement('div'); d.className = 'home-item';
          d.innerHTML = `
            <div class="note">${lines.slice(1).join('<br>')}</div>
            <div class="home-img-wrapper"><img src="${lines[0]}" onclick="viewImg(this.src)"></div>`;
          box.appendChild(d);
        }
      } catch(e) { box.innerHTML = 'Đang cập nhật bản tin...'; }
    }

    async function loadMemories() {
      const g = document.getElementById('main-gallery');
      try {
        const r = await fetch('pic.txt');
        const urls = JSON.parse((await r.text()).replace(/```json|```/g, '').trim());
        g.innerHTML = urls.map((u, i) => `
          <div class="gallery-item">
            <img src="${u}" onclick="viewImg(this.src)">
            <div class="caption">Kỉ niệm ${i+1}</div>
          </div>`).join('');
      } catch(e) { g.innerHTML = 'Lỗi tải ảnh.'; }
    }

    function showPage(id) {
      const target = id || 'home';
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      document.getElementById(target).classList.add('active');
      document.querySelectorAll('nav a').forEach(a => {
        a.classList.remove('active');
        if(a.getAttribute('href') === '#'+target) {
          a.classList.add('active');
          setTimeout(() => moveIndicator(a), 100);
        }
      });
      if(target === 'home') loadHome();
      if(target === 'memories') loadMemories();
    }

    window.onhashchange = () => showPage(location.hash.slice(1));
    window.onload = () => {
      showPage(location.hash.slice(1) || 'home');
      fetch('stu.txt').then(r => r.text()).then(t => students = t.split('\n').map(s=>s.trim()).filter(s=>s));
    };

    // Darkmode đơn giản
    const themeBtn = document.getElementById('theme-btn');
    themeBtn.onclick = () => {
      document.body.classList.toggle('dark-mode');
      themeBtn.innerText = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    };

    function viewImg(s) { document.getElementById('img-full').src = s; document.getElementById('img-modal').style.display='flex'; }
    function closeModal() { document.getElementById('st-modal').style.display='none'; }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9A7 - Những Năm Tháng Rực Rỡ</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #ffffff;
            --surface: #f8fafc;
            --text: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius: 12px;
        }

        .dark-mode {
            --primary: #60a5fa;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.5; transition: background 0.3s; }

        /* HEADER & NAV */
        header {
            position: fixed; top: 0; width: 100%; z-index: 100;
            background: rgba(var(--bg), 0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.75rem 2rem;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 1.2rem; }
        #logo { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }

        nav { display: flex; gap: 1rem; }
        nav a {
            text-decoration: none; color: var(--text-light);
            font-size: 0.95rem; font-weight: 500; padding: 0.5rem 1rem;
            border-radius: var(--radius); transition: 0.2s;
        }
        nav a:hover, nav a.active { color: var(--primary); background: var(--surface); }

        /* SEARCH BAR */
        .search-box { position: relative; width: 280px; }
        #search-input {
            width: 100%; padding: 0.6rem 1rem; border-radius: 20px;
            border: 1px solid var(--border); background: var(--surface);
            color: var(--text); outline: none; transition: 0.3s;
        }
        #search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

        #search-results {
            position: absolute; top: 120%; left: 0; right: 0;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden; display: none;
            box-shadow: var(--card-shadow); z-index: 101;
        }
        #search-results.show { display: block; }
        .result-item { padding: 0.8rem 1rem; cursor: pointer; border-bottom: 1px solid var(--border); }
        .result-item:hover { background: var(--border); color: var(--primary); }

        /* LAYOUT */
        main { margin-top: 80px; padding: 2rem; max-width: 1100px; margin-inline: auto; }
        section { display: none; animation: fadeIn 0.5s ease; }
        section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* NEWS/HOME FEED */
        .post-card {
            background: var(--surface); border-radius: var(--radius);
            border: 1px solid var(--border); margin-bottom: 2rem; overflow: hidden;
            display: grid; grid-template-columns: 1fr 1fr;
        }
        .post-content { padding: 2rem; display: flex; flex-direction: column; justify-content: center; }
        .post-img { width: 100%; height: 350px; object-fit: cover; cursor: zoom-in; }

        /* GALLERY GRID */
        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .gallery-card {
            border-radius: var(--radius); overflow: hidden;
            background: var(--surface); border: 1px solid var(--border);
            transition: 0.3s;
        }
        .gallery-card:hover { transform: translateY(-8px); box-shadow: var(--card-shadow); }
        .gallery-card img { width: 100%; height: 220px; object-fit: cover; }

        /* MODAL */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: var(--bg); width: 100%; max-width: 700px;
            border-radius: 20px; position: relative; padding: 2rem;
            max-height: 90vh; overflow-y: auto;
        }
        .close-btn { position: absolute; top: 1.5rem; right: 1.5rem; font-size: 1.5rem; cursor: pointer; }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 1rem; padding: 1rem; }
            .post-card { grid-template-columns: 1fr; }
            .search-box { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img id="logo" src="" alt="9A7">
            <span>9A7 Memories</span>
        </div>
        <nav>
            <a href="#home" class="active">Bản tin</a>
            <a href="#gallery">Kỉ niệm</a>
            <a href="#info">Thông tin</a>
            <button id="dark-toggle" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">🌙</button>
        </nav>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Tìm bạn bè...">
            <div id="search-results"></div>
        </div>
    </header>

    <main>
        <section id="home" class="active">
            <h2 style="margin-bottom: 2rem;">Bản tin lớp học</h2>
            <div id="feed-container"></div>
        </section>

        <section id="gallery">
            <h2 style="margin-bottom: 2rem;">Khoảnh khắc đáng nhớ</h2>
            <div class="gallery-grid" id="gallery-container"></div>
        </section>

        <section id="info">
            <div id="info-render" class="post-content" style="background:var(--surface); border-radius:var(--radius);"></div>
        </section>
    </main>

    <div id="modal-student" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="UI.closeModal()">&times;</span>
            <div style="display:flex; align-items:center; gap:20px; margin-bottom:2rem;">
                <img id="st-avatar" style="width:120px; height:120px; border-radius:50%; object-fit:cover; border:4px solid var(--primary);">
                <div>
                    <h2 id="st-name"></h2>
                    <p id="st-desc" style="color:var(--text-light);"></p>
                </div>
            </div>
            <div id="st-pics" class="gallery-grid" style="grid-template-columns: repeat(3, 1fr);"></div>
        </div>
    </div>

    <div id="modal-img" class="modal" onclick="this.style.display='none'">
        <img id="img-preview" style="max-width:95%; max-height:95%; object-fit:contain; border-radius:8px;">
    </div>

    <script>
        // DATA CONTROLLER
        const Data = {
            async fetchText(url) {
                try { const r = await fetch(url); return r.ok ? await r.text() : ''; } 
                catch { return ''; }
            },
            async fetchJSON(url) {
                try { const r = await fetch(url); return r.ok ? await r.json() : []; }
                catch { return []; }
            }
        };

        // UI CONTROLLER
        const UI = {
            init() {
                this.bindTheme();
                this.bindNav();
                this.bindSearch();
                this.loadCore();
            },

            bindTheme() {
                const btn = document.getElementById('dark-toggle');
                const setTheme = (isDark) => {
                    document.body.classList.toggle('dark-mode', isDark);
                    btn.innerText = isDark ? '☀️' : '🌙';
                    localStorage.setItem('9a7-theme', isDark ? 'dark' : 'light');
                };
                setTheme(localStorage.getItem('9a7-theme') === 'dark');
                btn.onclick = () => setTheme(!document.body.classList.contains('dark-mode'));
            },

            bindNav() {
                window.onhashchange = () => {
                    const hash = location.hash || '#home';
                    document.querySelectorAll('nav a').forEach(a => a.classList.toggle('active', a.getAttribute('href') === hash));
                    document.querySelectorAll('section').forEach(s => s.classList.toggle('active', `#${s.id}` === hash));
                    if (hash === '#home') this.renderHome();
                    if (hash === '#gallery') this.renderGallery();
                    if (hash === '#info') this.renderInfo();
                };
                window.onhashchange();
            },

            async loadCore() {
                const logo = await Data.fetchText('logo.txt');
                if (logo) document.getElementById('logo').src = logo.trim();
                const stuList = await Data.fetchText('stu.txt');
                this.students = stuList.split('\n').map(s => s.trim()).filter(s => s);
            },

            bindSearch() {
                const input = document.getElementById('search-input');
                const res = document.getElementById('search-results');
                
                input.oninput = () => {
                    const val = input.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                    if (!val) return res.classList.remove('show');

                    const matches = this.students.filter(s => 
                        s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(val)
                    );

                    res.innerHTML = matches.map(m => `<div class="result-item">${m}</div>`).join('');
                    res.classList.toggle('show', matches.length > 0);
                    
                    res.querySelectorAll('.result-item').forEach(item => {
                        item.onclick = () => {
                            this.showStudent(item.innerText);
                            res.classList.remove('show');
                            input.value = '';
                        };
                    });
                };
            },

            async renderHome() {
                const container = document.getElementById('feed-container');
                container.innerHTML = '<p>Đang tải tin mới nhất...</p>';
                const files = await Data.fetchJSON('home/list.txt');
                const posts = await Promise.all(files.map(f => Data.fetchText(`home/${f}`)));
                
                container.innerHTML = posts.map(p => {
                    const [img, ...lines] = p.split('\n');
                    return `
                        <div class="post-card">
                            <div class="post-content">
                                <p>${lines.join('<br>')}</p>
                            </div>
                            <img src="${img.trim()}" class="post-img" onclick="UI.preview('${img.trim()}')">
                        </div>`;
                }).join('');
            },

            async renderGallery() {
                const container = document.getElementById('gallery-container');
                const raw = await Data.fetchText('pic.txt');
                const urls = JSON.parse(raw.replace(/```json|```/g, ''));
                container.innerHTML = urls.map(u => `
                    <div class="gallery-card">
                        <img src="${u}" onclick="UI.preview('${u}')" loading="lazy">
                    </div>
                `).join('');
            },

            async renderInfo() {
                const txt = await Data.fetchText('info.txt');
                document.getElementById('info-render').innerHTML = `<h2 style="color:var(--primary)">Thông tin chung</h2><br>${txt.replace(/\n/g, '<br>')}`;
            },

            async showStudent(name) {
                const modal = document.getElementById('modal-student');
                const folder = encodeURIComponent(name).replace(/%20/g, '+');
                
                const [info, picsRaw] = await Promise.all([
                    Data.fetchText(`stu/${folder}/inf.txt`),
                    Data.fetchText(`stu/${folder}/pics.txt`)
                ]);
                
                const pics = picsRaw.split('\n').filter(p => p.trim());
                document.getElementById('st-name').innerText = name;
                document.getElementById('st-desc').innerText = info || 'Người bạn tuyệt vời lớp 9A7';
                document.getElementById('st-avatar').src = pics[0] || '';
                document.getElementById('st-pics').innerHTML = pics.slice(1).map(p => `<img src="${p}" onclick="UI.preview('${p}')" style="width:100%; height:120px; object-fit:cover; border-radius:8px; cursor:zoom-in;">`).join('');
                
                modal.style.display = 'flex';
            },

            preview(src) {
                document.getElementById('img-preview').src = src;
                document.getElementById('modal-img').style.display = 'flex';
            },

            closeModal() { document.getElementById('modal-student').style.display = 'none'; }
        };

        UI.init();
    </script>
</body>
</html>

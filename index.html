<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9A7 - Kết Nối Tập Thể</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #ffffff;
            --surface: #f8fafc;
            --text: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
            --radius: 16px;
            --container-w: 1200px;
        }

        .dark-mode {
            --primary: #60a5fa;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            transition: background 0.3s ease;
            line-height: 1.6;
        }

        /* --- NAVIGATION RESPONSIVE --- */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(var(--bg), 0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 0;
        }

        .header-container {
            max-width: var(--container-w);
            margin: 0 auto; padding: 0 1.5rem;
            display: flex; align-items: center; justify-content: space-between;
            gap: 1rem;
        }

        .logo-area { display: flex; align-items: center; gap: 10px; font-weight: 700; min-width: max-content; }
        #logo { width: 38px; height: 38px; border-radius: 10px; object-fit: cover; }

        nav { display: flex; gap: 0.5rem; overflow-x: auto; scrollbar-width: none; }
        nav::-webkit-scrollbar { display: none; }
        nav a {
            text-decoration: none; color: var(--text-light);
            font-size: 0.9rem; font-weight: 600; padding: 0.5rem 0.8rem;
            border-radius: 10px; white-space: nowrap; transition: 0.2s;
        }
        nav a.active { color: var(--primary); background: var(--surface); }

        /* --- MAIN LAYOUT --- */
        main { 
            margin-top: 80px; 
            padding: 1.5rem; 
            max-width: var(--container-w); 
            margin-inline: auto; 
        }

        section { display: none; animation: slideUp 0.4s ease-out; }
        section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- BẢN TIN (POST CARDS) --- */
        .feed-grid { display: grid; gap: 1.5rem; }
        
        .post-card {
            background: var(--surface); border-radius: var(--radius);
            border: 1px solid var(--border); overflow: hidden;
            display: flex; flex-direction: row; /* Mặc định ngang cho PC */
        }

        .post-img-box { flex: 1.2; min-height: 300px; }
        .post-img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        .post-content { flex: 1; padding: 2rem; display: flex; flex-direction: column; justify-content: center; }

        /* --- GALLERY (KỈ NIỆM) --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }
        .gallery-item {
            aspect-ratio: 4/3; border-radius: var(--radius); overflow: hidden;
            border: 1px solid var(--border); cursor: pointer;
        }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .gallery-item:hover img { transform: scale(1.05); }

        /* --- RESPONSIVE ADJUSTMENTS --- */
        
        /* Tablet (Dưới 1024px) */
        @media (max-width: 1024px) {
            .post-card { flex-direction: column; } /* Chuyển bản tin sang dọc */
            .post-img-box { min-height: 250px; }
            .header-container { padding: 0 1rem; }
        }

        /* Mobile (Dưới 768px) */
        @media (max-width: 768px) {
            header { padding: 0.5rem 0; }
            .header-container { flex-direction: column; align-items: stretch; }
            
            .search-box { width: 100%; margin-top: 0.5rem; }
            #search-input { width: 100%; }

            .post-content { padding: 1.25rem; }
            h2 { font-size: 1.5rem; }
            
            nav { justify-content: space-between; border-top: 1px solid var(--border); padding-top: 0.5rem; }
            nav a { padding: 0.5rem 0.4rem; font-size: 0.85rem; }
        }

        /* --- SEARCH & MODAL (Giữ nguyên logic từ bản trước nhưng làm đẹp hơn) --- */
        .search-box { position: relative; }
        #search-input {
            padding: 0.6rem 1.2rem; border-radius: 25px;
            border: 1px solid var(--border); background: var(--surface);
            color: var(--text); outline: none; width: 220px;
        }
        #search-input:focus { width: 280px; border-color: var(--primary); }
        
        #search-results {
            position: absolute; top: 120%; left: 0; right: 0;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden; display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 101;
        }
        #search-results.show { display: block; }
        .result-item { padding: 0.8rem 1.2rem; cursor: pointer; }
        .result-item:hover { background: var(--surface); color: var(--primary); }

        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center;
            z-index: 2000; padding: 1rem; backdrop-filter: blur(8px);
        }
        .modal-content {
            background: var(--bg); width: 100%; max-width: 600px;
            border-radius: 24px; padding: 2rem; position: relative;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo-area">
                <img id="logo" src="" alt="9A7">
                <span>Lớp 9A7</span>
            </div>
            
            <nav id="main-nav">
                <a href="#home" class="active">Bản tin</a>
                <a href="#gallery">Kỉ niệm</a>
                <a href="#info">Thông tin</a>
                <button id="theme-toggle" style="background:none; border:none; cursor:pointer; font-size:1.2rem; margin-left:10px;">🌙</button>
            </nav>

            <div class="search-box">
                <input type="text" id="search-input" placeholder="Tìm tên bạn bè...">
                <div id="search-results"></div>
            </div>
        </div>
    </header>

    <main>
        <section id="home" class="active">
            <h2 style="margin-bottom: 1.5rem;">Tin tức mới nhất</h2>
            <div id="feed-container" class="feed-grid"></div>
        </section>

        <section id="gallery">
            <h2 style="margin-bottom: 1.5rem;">Album ảnh lớp</h2>
            <div class="gallery-grid" id="gallery-container"></div>
        </section>

        <section id="info">
            <div id="info-render" class="post-content" style="background:var(--surface); border-radius:var(--radius); border:1px solid var(--border);"></div>
        </section>
    </main>

    <div id="modal-student" class="modal">
        <div class="modal-content">
            <button onclick="UI.closeModal()" style="position:absolute; right:20px; top:20px; border:none; background:none; font-size:1.5rem; cursor:pointer; color:var(--text-light);">&times;</button>
            <div style="text-align:center;">
                <img id="st-avatar" style="width:110px; height:110px; border-radius:50%; object-fit:cover; border:4px solid var(--primary); margin-bottom:1rem;">
                <h2 id="st-name"></h2>
                <p id="st-desc" style="color:var(--text-light); margin:10px 0 20px;"></p>
                <div id="st-pics" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:8px;"></div>
            </div>
        </div>
    </div>

    <div id="modal-img" class="modal" onclick="this.style.display='none'">
        <img id="img-preview" style="max-width:98%; max-height:98%; object-fit:contain; border-radius:12px;">
    </div>

    <script>
        const Data = {
            async getT(url) { try { const r = await fetch(url); return r.ok ? await r.text() : ''; } catch { return ''; } },
            async getJ(url) { try { const r = await fetch(url); return r.ok ? await r.json() : []; } catch { return []; } }
        };

        const UI = {
            async init() {
                this.setupTheme();
                this.setupNav();
                this.setupSearch();
                await this.loadBase();
            },

            setupTheme() {
                const btn = document.getElementById('theme-toggle');
                const update = (dark) => {
                    document.body.classList.toggle('dark-mode', dark);
                    btn.innerText = dark ? '☀️' : '🌙';
                    localStorage.setItem('theme', dark ? 'dark' : 'light');
                };
                update(localStorage.getItem('theme') === 'dark');
                btn.onclick = () => update(!document.body.classList.contains('dark-mode'));
            },

            setupNav() {
                window.onhashchange = () => {
                    const h = location.hash || '#home';
                    document.querySelectorAll('nav a').forEach(a => a.classList.toggle('active', a.getAttribute('href') === h));
                    document.querySelectorAll('section').forEach(s => s.classList.toggle('active', `#${s.id}` === h));
                    if(h === '#home') this.loadHome();
                    if(h === '#gallery') this.loadGallery();
                    if(h === '#info') this.loadInfo();
                };
                window.onhashchange();
            },

            async loadBase() {
                const l = await Data.getT('logo.txt');
                if(l) document.getElementById('logo').src = l.trim();
                const s = await Data.getT('stu.txt');
                this.students = s.split('\n').map(x => x.trim()).filter(x => x);
            },

            setupSearch() {
                const input = document.getElementById('search-input');
                const res = document.getElementById('search-results');
                input.oninput = () => {
                    const v = input.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                    if(!v) return res.classList.remove('show');
                    const matches = this.students.filter(s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(v));
                    res.innerHTML = matches.map(m => `<div class="result-item">${m}</div>`).join('');
                    res.classList.toggle('show', matches.length > 0);
                    res.querySelectorAll('.result-item').forEach(i => {
                        i.onclick = () => { this.showStudent(i.innerText); res.classList.remove('show'); input.value = ''; };
                    });
                };
            },

            async loadHome() {
                const con = document.getElementById('feed-container');
                con.innerHTML = 'Đang tải tin tức...';
                const files = await Data.getJ('home/list.txt');
                const posts = await Promise.all(files.map(f => Data.getT(`home/${f}`)));
                con.innerHTML = posts.map(p => {
                    const [img, ...txt] = p.split('\n');
                    return `<div class="post-card">
                        <div class="post-img-box"><img src="${img.trim()}" class="post-img" onclick="UI.preview('${img.trim()}')" loading="lazy"></div>
                        <div class="post-content"><p>${txt.join('<br>')}</p></div>
                    </div>`;
                }).join('');
            },

            async loadGallery() {
                const con = document.getElementById('gallery-container');
                const raw = await Data.getT('pic.txt');
                const urls = JSON.parse(raw.replace(/```json|```/g, ''));
                con.innerHTML = urls.map(u => `<div class="gallery-item"><img src="${u}" onclick="UI.preview('${u}')" loading="lazy"></div>`).join('');
            },

            async loadInfo() {
                const t = await Data.getT('info.txt');
                document.getElementById('info-render').innerHTML = `<h3>Thông tin lớp 9A7</h3><br>${t.replace(/\n/g, '<br>')}`;
            },

            async showStudent(name) {
                const folder = encodeURIComponent(name).replace(/%20/g, '+');
                const [inf, picsR] = await Promise.all([Data.getT(`stu/${folder}/inf.txt`), Data.getT(`stu/${folder}/pics.txt`)]);
                const pics = picsR.split('\n').filter(p => p.trim());
                document.getElementById('st-name').innerText = name;
                document.getElementById('st-desc').innerText = inf || 'Thành viên lớp 9A7';
                document.getElementById('st-avatar').src = pics[0] || '';
                document.getElementById('st-pics').innerHTML = pics.slice(1).map(p => `<img src="${p}" onclick="UI.preview('${p}')" style="width:100%; height:100px; object-fit:cover; border-radius:12px; cursor:zoom-in;">`).join('');
                document.getElementById('modal-student').style.display = 'flex';
            },

            preview(src) { document.getElementById('img-preview').src = src; document.getElementById('modal-img').style.display = 'flex'; },
            closeModal() { document.getElementById('modal-student').style.display = 'none'; }
        };

        UI.init();
    </script>
</body>
</html>

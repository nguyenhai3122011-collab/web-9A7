<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lớp 9A7 - THCS Đông La</title>
  <style>
    /* BIẾN MÀU */
    :root {
      --bg-color: #ffffff;
      --card-bg: rgba(246, 248, 250, 0.85);
      --text-color: #1f2328;
      --accent-color: #0969da;
      --border-color: #d0d7de;
      --hover-bg: #eaeef2;
      --indicator-bg: rgba(9, 105, 218, 0.1); /* Màu nền thanh trượt */
    }

    body.dark-mode {
      --bg-color: #0d1117;
      --card-bg: rgba(22, 27, 34, 0.85);
      --text-color: #c9d1d9;
      --accent-color: #58a6ff;
      --border-color: #30363d;
      --hover-bg: #21262d;
      --indicator-bg: rgba(88, 166, 255, 0.15);
    }

    * { transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0; padding: 0;
    }

    /* HEADER & NAV */
    header {
      background-color: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      gap: 20px;
    }

    .header-main-nav { display: flex; align-items: center; gap: 15px; flex: 1; }
    
    /* NAV VỚI HIỆU ỨNG TRƯỢT */
    nav { 
      display: flex; 
      gap: 5px; 
      align-items: center; 
      position: relative; /* Quan trọng để định vị indicator */
    }

    nav a { 
      color: var(--text-color); 
      text-decoration: none; 
      font-weight: 600; 
      padding: 8px 16px; 
      border-radius: 6px; 
      font-size: 14px;
      position: relative;
      z-index: 2; /* Nằm trên indicator */
      transition: color 0.3s ease;
    }

    nav a.active { color: var(--accent-color); }

    /* THANH TRƯỢT (INDICATOR) */
    .nav-indicator {
      position: absolute;
      background-color: var(--indicator-bg);
      border-radius: 6px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); /* Hiệu ứng trượt đàn hồi */
      z-index: 1;
      pointer-events: none; /* Không cản trở việc click */
      height: 34px; /* Khớp với chiều cao padding của thẻ a */
    }

    /* SEARCH & THEME */
    .search-container { position: relative; max-width: 200px; width: 100%; }
    #search-input { 
      width: 100%; padding: 6px 15px; border-radius: 20px; border: 1px solid var(--border-color);
      background: var(--bg-color); color: var(--text-color); outline: none;
    }

    .theme-switch {
      background: var(--bg-color); border: 1px solid var(--border-color);
      border-radius: 50%; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* HIỆU ỨNG CHUYỂN TRANG MƯỢT */
    section { 
      display: none; 
      opacity: 0; 
      transform: translateY(15px); 
      transition: all 0.5s ease;
      margin-top: 100px;
      padding: 20px;
      max-width: 1000px;
      margin-left: auto;
      margin-right: auto;
    }
    section.show { display: block; opacity: 1; transform: translateY(0); }

    h1 { color: var(--accent-color); text-align: center; }
  </style>
</head>
<body>

  <header id="main-header">
    <div class="header-main-nav">
      <img id="logo" src="https://via.placeholder.com/42" alt="Logo" style="width:42px; height:42px; border-radius:8px;">
      <nav id="nav-menu">
        <div class="nav-indicator" id="nav-indicator"></div>
        
        <a href="#home">Trang Chủ</a>
        <a href="#memories">Kỉ Niệm</a>
        <a href="#info">Thông Tin</a>

        <div class="search-container">
          <input type="text" id="search-input" placeholder="Tìm tên...">
        </div>
      </nav>
    </div>
    <button class="theme-switch" id="theme-btn">🌙</button>
  </header>

  <main>
    <section id="home"><h1>Bản Tin 9A7</h1><div id="home-list"></div></section>
    <section id="memories"><h1>Kho Ảnh Kỉ Niệm</h1><div id="main-gallery"></div></section>
    <section id="info"><h1>Thông Tin Lớp</h1><div id="info-content"></div></section>
  </main>

  <script>
    const navMenu = document.getElementById('nav-menu');
    const indicator = document.getElementById('nav-indicator');
    const navLinks = document.querySelectorAll('nav a');

    // --- HÀM DI CHUYỂN THANH TRƯỢT ---
    function moveIndicator(element) {
      if (!element) return;
      indicator.style.width = `${element.offsetWidth}px`;
      indicator.style.left = `${element.offsetLeft}px`;
      indicator.style.top = `${element.offsetTop}px`;
    }

    // Hiệu ứng khi di chuột qua (Hover)
    navLinks.forEach(link => {
      link.addEventListener('mouseenter', (e) => moveIndicator(e.target));
    });

    // Khi di chuột ra ngoài: Quay về mục đang Active
    navMenu.addEventListener('mouseleave', () => {
      const activeLink = document.querySelector('nav a.active');
      moveIndicator(activeLink);
    });

    // --- CHUYỂN TRANG ---
    function showPage(id) {
      const targetId = id || 'home';
      const sections = document.querySelectorAll('section');
      
      sections.forEach(s => s.classList.remove('show'));
      
      const target = document.getElementById(targetId);
      target.classList.add('show');

      navLinks.forEach(a => {
        a.classList.remove('active');
        if(a.getAttribute('href') === '#' + targetId) {
          a.classList.add('active');
          moveIndicator(a); // Di chuyển thanh trượt tới mục vừa chọn
        }
      });
    }

    window.onhashchange = () => showPage(location.hash.slice(1));

    // --- DARK MODE ---
    const themeBtn = document.getElementById('theme-btn');
    themeBtn.onclick = () => {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      themeBtn.innerText = isDark ? '☀️' : '🌙';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      // Cập nhật lại vị trí indicator sau khi đổi theme vì kích thước font có thể thay đổi nhẹ
      setTimeout(() => moveIndicator(document.querySelector('nav a.active')), 100);
    };

    // Khởi tạo ban đầu
    window.onload = () => {
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        themeBtn.innerText = '☀️';
      }
      showPage(location.hash.slice(1));
    };
  </script>
</body>
</html>

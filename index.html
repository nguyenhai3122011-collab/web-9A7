<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lớp 9A7 - THCS Đông La</title>
  <style>
    /* HỆ THỐNG BIẾN MÀU */
    :root {
      --bg-color: #ffffff;
      --card-bg: #f6f8fa;
      --text-color: #1f2328;
      --accent-color: #0969da;
      --border-color: #d0d7de;
      --indicator-color: rgba(9, 105, 218, 0.12);
    }

    body.dark-mode {
      --bg-color: #0d1117;
      --card-bg: #161b22;
      --text-color: #c9d1d9;
      --accent-color: #58a6ff;
      --border-color: #30363d;
      --indicator-color: rgba(88, 166, 255, 0.18);
    }

    * { transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0; padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER & NAV */
    header {
      background-color: var(--card-bg);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      gap: 20px;
    }

    .header-main-nav { display: flex; align-items: center; gap: 15px; flex: 1; }
    #logo { width: 42px; height: 42px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border-color); }
    
    nav { display: flex; gap: 5px; align-items: center; position: relative; }
    nav a { 
      color: var(--text-color); 
      text-decoration: none; 
      font-weight: 600; 
      padding: 8px 12px; 
      border-radius: 6px; 
      font-size: 14px;
      position: relative;
      z-index: 2;
      opacity: 0.7;
    }
    nav a.active { color: var(--accent-color); opacity: 1; }

    #nav-indicator {
      position: absolute;
      background-color: var(--indicator-color);
      border-radius: 6px;
      z-index: 1;
      transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.2); 
      height: 34px; 
    }

    /* TRANG CHỦ - HIỆU ỨNG HÒA QUYỆN (MASK GRADIENT) */
    main { margin-top: 85px; padding: 20px; max-width: 1000px; margin-left: auto; margin-right: auto; }
    section { display: none; opacity: 0; transform: translateY(20px); transition: all 0.5s ease; }
    section.active { display: block; opacity: 1; transform: translateY(0); }

    .home-item { 
      display: flex; 
      background-color: var(--card-bg); 
      border-radius: 12px; 
      margin-bottom: 30px; 
      border: 1px solid var(--border-color); 
      overflow: hidden;
      align-items: stretch; /* Đảm bảo chiều cao bằng nhau */
    }

    .home-item .note { 
      flex: 1.2; 
      padding: 30px; 
      line-height: 1.8; 
      font-size: 15px; 
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .home-item .img-wrapper {
      flex: 1;
      position: relative;
    }

    .home-item img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      display: block;
      cursor: pointer;
      /* Hiệu ứng mờ dần từ phía chữ sang ảnh */
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 25%);
      mask-image: linear-gradient(to right, transparent 0%, black 25%);
    }

    /* KỈ NIỆM */
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
    .gallery-item { background-color: var(--card-bg); border-radius: 10px; border: 1px solid var(--border-color); overflow: hidden; }
    .gallery-item img { width: 100%; height: 200px; object-fit: cover; cursor: pointer; display: block; }
    .gallery-item .caption { padding: 12px; text-align: center; font-weight: 500; font-size: 13px; text-transform: capitalize; }

    /* MODAL */
    .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
    .close { position: absolute; top: 15px; right: 25px; color: white; font-size: 35px; cursor: pointer; }
    #img-full { max-width: 90%; max-height: 90%; border-radius: 8px; }

    /* RESPONSIVE */
    @media (max-width: 850px) {
      .home-item { flex-direction: column-reverse; }
      .home-item img { 
        height: 250px; 
        -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 30%);
        mask-image: linear-gradient(to bottom, transparent 0%, black 30%);
      }
      #nav-indicator { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-main-nav">
      <img id="logo" src="https://via.placeholder.com/42" alt="Logo">
      <nav id="nav-menu">
        <div id="nav-indicator"></div>
        <a href="#home">Trang Chủ</a>
        <a href="#memories">Kỉ Niệm</a>
        <a href="#info">Thông Tin</a>
      </nav>
    </div>
    <button class="theme-switch" id="theme-btn" onclick="toggleTheme()">🌙</button>
  </header>

  <main>
    <section id="home"><h1>Bản Tin 9A7</h1><div id="home-list"></div></section>
    <section id="memories"><h1>Kho Ảnh Kỉ Niệm</h1><div class="gallery" id="main-gallery"></div></section>
    <section id="info"><h1>Thông Tin Lớp</h1><div id="info-content" style="background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--border-color); line-height: 1.8;"></div></section>
  </main>

  <div id="img-modal" class="modal" onclick="this.style.display='none'"><span class="close">&times;</span><img id="img-full" src=""></div>

  <script>
    const indicator = document.getElementById('nav-indicator');

    function moveIndicator(el) {
      if (!el) return;
      indicator.style.width = `${el.offsetWidth}px`;
      indicator.style.left = `${el.offsetLeft}px`;
    }

    function showPage(id) {
      const targetId = id || 'home';
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      const target = document.getElementById(targetId);
      if(target) target.classList.add('active');

      document.querySelectorAll('nav a').forEach(a => {
        a.classList.remove('active');
        if(a.getAttribute('href') === '#'+targetId) {
          a.classList.add('active');
          moveIndicator(a);
        }
      });

      if(targetId === 'home') loadHome();
      if(targetId === 'memories') loadMemories();
      if(targetId === 'info') loadInfo();
    }

    // --- LOAD TRANG CHỦ (ẢNH MỜ DẦN) ---
    async function loadHome() {
      const box = document.getElementById('home-list'); box.innerHTML = 'Đang tải...';
      try {
        const r = await fetch('home/list.txt');
        const files = await r.json(); box.innerHTML = '';
        for(let f of files) {
          const fr = await fetch(`home/${f}`);
          const txt = await fr.text(); const lines = txt.split('\n');
          const d = document.createElement('div'); d.className = 'home-item';
          d.innerHTML = `
            <div class="note">${lines.slice(1).join('<br>')}</div>
            <div class="img-wrapper">
              <img src="${lines[0]}" onclick="viewImg(this.src)">
            </div>`;
          box.appendChild(d);
        }
      } catch(e) { box.innerHTML = 'Chưa có bản tin.'; }
    }

    // --- LOAD KỈ NIỆM (HIỆN TÊN BỎ ĐUÔI) ---
    async function loadMemories() {
      const g = document.getElementById('main-gallery'); g.innerHTML = 'Đang tải...';
      try {
        const r = await fetch('pic.txt');
        let urls = JSON.parse((await r.text()).replace(/```json|```/g, '').trim());
        g.innerHTML = '';
        urls.forEach((u) => {
          // Lấy tên file từ URL: ví dụ "anh-lop.jpg" -> "anh-lop"
          const fileName = u.split('/').pop().split('.').slice(0, -1).join('.');
          // Làm sạch tên: đổi dấu gạch thành khoảng trắng
          const cleanName = fileName.replace(/[-_]/g, ' ');

          const item = document.createElement('div'); item.className = 'gallery-item';
          item.innerHTML = `
            <img src="${u}" onclick="viewImg(this.src)">
            <div class="caption">${cleanName || 'Kỉ niệm'}</div>`;
          g.appendChild(item);
        });
      } catch(e) { g.innerHTML = 'Lỗi album.'; }
    }

    async function loadInfo() {
      try {
        const r = await fetch('info.txt');
        if(r.ok) document.getElementById('info-content').innerHTML = (await r.text()).replace(/\n/g, '<br>');
      } catch(e){}
    }

    function viewImg(src) {
      document.getElementById('img-full').src = src;
      document.getElementById('img-modal').style.display = 'flex';
    }

    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      document.getElementById('theme-btn').innerText = isDark ? '☀️' : '🌙';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      setTimeout(() => moveIndicator(document.querySelector('nav a.active')), 50);
    }

    window.onhashchange = () => showPage(location.hash.slice(1));
    window.onload = () => {
      if(localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('theme-btn').innerText = '☀️';
      }
      showPage(location.hash.slice(1));
      setTimeout(() => moveIndicator(document.querySelector('nav a.active')), 300);
    };

    // Load logo
    (async () => {
      try {
        const r = await fetch('logo.txt');
        if(r.ok) document.getElementById('logo').src = (await r.text()).trim();
      } catch(e){}
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9A7 - Những Năm Tháng Rực Rỡ</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #ffffff;
            --surface: #f8fafc;
            --text: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
            --radius: 16px;
            --header-h: 70px;
            --sidebar-w: 280px;
        }

        .dark-mode {
            --primary: #60a5fa;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            transition: background 0.3s ease;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            position: fixed; top: 0; width: 100%; height: var(--header-h); z-index: 1000;
            background: rgba(var(--bg), 0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 1.5rem; justify-content: space-between;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-btn {
            background: none; border: none; color: var(--text);
            font-size: 1.5rem; cursor: pointer; padding: 5px;
            display: flex; align-items: center; justify-content: center;
        }

        .logo-area { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.1rem; }
        #logo { width: 35px; height: 35px; border-radius: 8px; object-fit: cover; }

        /* --- SIDEBAR --- */
        #sidebar {
            position: fixed; top: 0; left: calc(-1 * var(--sidebar-w));
            width: var(--sidebar-w); height: 100%;
            background: var(--surface); z-index: 2001;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
        }
        #sidebar.open { left: 0; }

        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px); z-index: 2000;
            display: none; animation: fadeIn 0.3s;
        }

        .sidebar-nav { display: flex; flex-direction: column; gap: 8px; margin-top: 2rem; }
        .sidebar-nav a {
            padding: 12px 16px; border-radius: 12px;
            text-decoration: none; color: var(--text);
            font-weight: 500; transition: 0.2s;
            display: flex; align-items: center; gap: 12px;
        }
        .sidebar-nav a:hover, .sidebar-nav a.active { background: var(--primary); color: white; }

        /* --- SEARCH & ACTIONS --- */
        .header-right { display: flex; align-items: center; gap: 15px; }
        .search-box { position: relative; }
        #search-input {
            padding: 0.6rem 1rem; border-radius: 20px;
            border: 1px solid var(--border); background: var(--bg);
            color: var(--text); outline: none; width: 200px; transition: 0.3s;
        }
        #search-input:focus { width: 260px; border-color: var(--primary); }

        #search-results {
            position: absolute; top: 120%; left: 0; right: 0;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden; display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 101;
        }
        #search-results.show { display: block; }
        .result-item { padding: 0.8rem 1rem; cursor: pointer; border-bottom: 1px solid var(--border); }
        .result-item:hover { background: var(--surface); color: var(--primary); }

        /* --- MAIN CONTENT --- */
        main { margin-top: var(--header-h); padding: 2rem 1.5rem; max-width: 1100px; margin-inline: auto; }
        section { display: none; animation: slideUp 0.4s ease-out; }
        section.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- RESPONSIVE LAYOUTS --- */
        .post-card {
            background: var(--surface); border-radius: var(--radius);
            border: 1px solid var(--border); margin-bottom: 2rem;
            display: grid; grid-template-columns: 1.2fr 1fr; overflow: hidden;
        }
        .post-img { width: 100%; height: 400px; object-fit: cover; cursor: zoom-in; }
        .post-content { padding: 2.5rem; display: flex; flex-direction: column; justify-content: center; }

        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .gallery-item {
            border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border);
            aspect-ratio: 4/3; cursor: pointer; transition: 0.3s;
        }
        .gallery-item:hover { transform: translateY(-5px); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 850px) {
            .post-card { grid-template-columns: 1fr; }
            .post-img { height: 280px; }
            .post-content { padding: 1.5rem; }
            #search-input { width: 150px; }
            #search-input:focus { width: 180px; }
        }

        @media (max-width: 500px) {
            .logo-area span { display: none; } /* Ẩn chữ logo trên máy cực nhỏ */
            header { padding: 0 10px; }
        }

        /* --- MODALS --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center;
            z-index: 3000; padding: 20px; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--bg); width: 100%; max-width: 650px;
            border-radius: 24px; padding: 2rem; position: relative;
            max-height: 90vh; overflow-y: auto;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="menu-btn" onclick="UI.toggleSidebar(true)">☰</button>
            <div class="logo-area">
                <img id="logo" src="" alt="9A7">
                <span>Lớp 9A7</span>
            </div>
        </div>

        <div class="header-right">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Tìm bạn...">
                <div id="search-results"></div>
            </div>
            <button id="theme-toggle" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">🌙</button>
        </div>
    </header>

    <div id="sidebar-overlay" class="overlay" onclick="UI.toggleSidebar(false)"></div>

    <aside id="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="font-size:1.2rem;">Menu</h2>
            <button onclick="UI.toggleSidebar(false)" style="background:none; border:none; font-size:1.5rem; cursor:pointer; color:var(--text-light);">&times;</button>
        </div>
        <nav class="sidebar-nav">
            <a href="#home" class="active" onclick="UI.toggleSidebar(false)">🏠 Bản tin</a>
            <a href="#gallery" onclick="UI.toggleSidebar(false)">🖼️ Kỉ niệm</a>
            <a href="#info" onclick="UI.toggleSidebar(false)">ℹ️ Thông tin</a>
            <a href="https://nguyenhai3122011-collab.github.io/9A7_forums/" target="_blank">💬 Diễn đàn lớp</a>
        </nav>
    </aside>

    <main>
        <section id="home" class="active">
            <h2 style="margin-bottom: 2rem;">Bản tin mới nhất</h2>
            <div id="feed-container"></div>
        </section>

        <section id="gallery">
            <h2 style="margin-bottom: 2rem;">Kho ảnh tập thể</h2>
            <div class="gallery-grid" id="gallery-container"></div>
        </section>

        <section id="info">
            <div id="info-render" style="background:var(--surface); padding:2rem; border-radius:var(--radius); border:1px solid var(--border);"></div>
        </section>
    </main>

    <div id="modal-student" class="modal">
        <div class="modal-content">
            <button onclick="UI.closeModal()" style="position:absolute; right:20px; top:20px; border:none; background:none; font-size:1.5rem; cursor:pointer; color:var(--text-light);">&times;</button>
            <div style="text-align:center;">
                <img id="st-avatar" style="width:120px; height:120px; border-radius:50%; object-fit:cover; border:4px solid var(--primary); margin-bottom:1rem;">
                <h2 id="st-name"></h2>
                <p id="st-desc" style="color:var(--text-light); margin-bottom:1.5rem;"></p>
                <div id="st-pics" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:10px;"></div>
            </div>
        </div>
    </div>

    <div id="modal-img" class="modal" onclick="this.style.display='none'">
        <img id="img-preview" style="max-width:98%; max-height:98%; object-fit:contain; border-radius:12px;">
    </div>

    <script>
        const Data = {
            async getT(url) { try { const r = await fetch(url); return r.ok ? await r.text() : ''; } catch { return ''; } },
            async getJ(url) { try { const r = await fetch(url); return r.ok ? await r.json() : []; } catch { return []; } }
        };

        const UI = {
            async init() {
                this.setupTheme();
                this.setupNav();
                this.setupSearch();
                await this.loadBase();
            },

            setupTheme() {
                const btn = document.getElementById('theme-toggle');
                const update = (dark) => {
                    document.body.classList.toggle('dark-mode', dark);
                    btn.innerText = dark ? '☀️' : '🌙';
                    localStorage.setItem('theme', dark ? 'dark' : 'light');
                };
                update(localStorage.getItem('theme') === 'dark');
                btn.onclick = () => update(!document.body.classList.contains('dark-mode'));
            },

            setupNav() {
                window.onhashchange = () => {
                    const h = location.hash || '#home';
                    document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.toggle('active', a.getAttribute('href') === h));
                    document.querySelectorAll('section').forEach(s => s.classList.toggle('active', `#${s.id}` === h));
                    if(h === '#home') this.loadHome();
                    if(h === '#gallery') this.loadGallery();
                    if(h === '#info') this.loadInfo();
                };
                window.onhashchange();
            },

            toggleSidebar(open) {
                document.getElementById('sidebar').classList.toggle('open', open);
                document.getElementById('sidebar-overlay').style.display = open ? 'block' : 'none';
                document.body.style.overflow = open ? 'hidden' : 'auto';
            },

            async loadBase() {
                const logo = await Data.getT('logo.txt');
                if(logo) document.getElementById('logo').src = logo.trim();
                const s = await Data.getT('stu.txt');
                this.students = s.split('\n').map(x => x.trim()).filter(x => x);
            },

            setupSearch() {
                const input = document.getElementById('search-input');
                const res = document.getElementById('search-results');
                input.oninput = () => {
                    const v = input.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                    if(!v) return res.classList.remove('show');
                    const matches = this.students.filter(s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(v));
                    res.innerHTML = matches.map(m => `<div class="result-item">${m}</div>`).join('');
                    res.classList.toggle('show', matches.length > 0);
                    res.querySelectorAll('.result-item').forEach(i => {
                        i.onclick = () => { this.showStudent(i.innerText); res.classList.remove('show'); input.value = ''; };
                    });
                };
            },

            async loadHome() {
                const con = document.getElementById('feed-container');
                con.innerHTML = 'Đang tải bản tin...';
                const files = await Data.getJ('home/list.txt');
                const posts = await Promise.all(files.map(f => Data.getT(`home/${f}`)));
                con.innerHTML = posts.map(p => {
                    const [img, ...txt] = p.split('\n');
                    return `<div class="post-card">
                        <img src="${img.trim()}" class="post-img" onclick="UI.preview('${img.trim()}')" loading="lazy">
                        <div class="post-content"><p>${txt.join('<br>')}</p></div>
                    </div>`;
                }).join('');
            },

            async loadGallery() {
                const con = document.getElementById('gallery-container');
                const raw = await Data.getT('pic.txt');
                const urls = JSON.parse(raw.replace(/```json|```/g, ''));
                con.innerHTML = urls.map(u => `<div class="gallery-item" onclick="UI.preview('${u}')"><img src="${u}" loading="lazy"></div>`).join('');
            },

            async loadInfo() {
                const t = await Data.getT('info.txt');
                document.getElementById('info-render').innerHTML = `<h3>Giới thiệu về 9A7</h3><br>${t.replace(/\n/g, '<br>')}`;
            },

            async showStudent(name) {
                const folder = encodeURIComponent(name).replace(/%20/g, '+');
                const [inf, picsR] = await Promise.all([Data.getT(`stu/${folder}/inf.txt`), Data.getT(`stu/${folder}/pics.txt`)]);
                const pics = picsR.split('\n').filter(p => p.trim());
                document.getElementById('st-name').innerText = name;
                document.getElementById('st-desc').innerText = inf || 'Một mảnh ghép tuyệt vời của 9A7';
                document.getElementById('st-avatar').src = pics[0] || '';
                document.getElementById('st-pics').innerHTML = pics.slice(1).map(p => `<img src="${p}" onclick="UI.preview('${p}')" style="width:100%; height:110px; object-fit:cover; border-radius:12px; cursor:zoom-in;">`).join('');
                document.getElementById('modal-student').style.display = 'flex';
            },

            preview(src) { document.getElementById('img-preview').src = src; document.getElementById('modal-img').style.display = 'flex'; },
            closeModal() { document.getElementById('modal-student').style.display = 'none'; }
        };

        UI.init();
    </script>
</body>
</html>
